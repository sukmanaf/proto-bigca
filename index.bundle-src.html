  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 20px 24px 0;
}
.onb-progress-step {
  display: flex; align-items: center;
  position: relative;
}
.onb-progress-step:not(:last-child)::after {
  content: ""; width: 60px; height: 2px; background: var(--gray-200); margin: 0 4px;
}
.onb-progress-step.done:not(:last-child)::after,
.onb-progress-step.current:not(:last-child)::after {
  background: var(--primary-300);
}
.onb-progress-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--gray-100);
  color: var(--gray-500);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
}
.onb-progress-step.done .onb-progress-num,
.onb-progress-step.current .onb-progress-num {
  background: var(--primary-600);
  color: white;
}
.onb-content { padding: 24px 32px; flex: 1; overflow-y: auto; }
.onb-step-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--primary-600);
  font-weight: 600;
}
.onb-title {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 4px 0 4px;
  color: var(--gray-900);
}
.onb-subtitle { font-size: 14px; color: var(--gray-600); margin-bottom: 20px; }
.onb-body { margin-top: 8px; }

.onb-step-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}
.onb-svg { width: 100%; border-radius: var(--radius-md); }
.onb-text p { font-size: 13px; color: var(--gray-700); line-height: 1.6; margin: 0 0 8px; }
.onb-text p strong { color: var(--gray-900); font-weight: 600; }
.onb-callout {
  padding: 12px 14px;
  background: var(--primary-50);
  border: 1px solid var(--primary-100);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
}
.onb-callout-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--primary-700);
  font-weight: 600;
}
.onb-callout-value { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-top: 2px; }
.onb-callout-meta { font-size: 11px; color: var(--gray-600); margin-top: 2px; }

.onb-zones-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.onb-zone-card {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 10px 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
}
.onb-zone-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--primary-100);
  color: var(--primary-700);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
}
.onb-zone-name { font-size: 12px; font-weight: 600; color: var(--gray-900); }
.onb-zone-desc { font-size: 11px; color: var(--gray-600); margin-top: 1px; line-height: 1.4; }

.onb-ai-preview {
  display: flex; flex-direction: column; gap: 8px;
  padding: 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
}
.onb-ai-preview .ai-msg-bubble { max-width: 220px; font-size: 12px; }
.onb-list {
  list-style: none; padding: 0; margin: 4px 0 12px;
}
.onb-list li {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--gray-700);
  padding: 4px 0;
}

.onb-kbd-grid {
  display: flex; flex-direction: column; gap: 6px;
}
.onb-kbd-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
}
.onb-kbd-keys { display: flex; gap: 2px; }
.onb-kbd-desc { font-size: 12px; color: var(--gray-700); }

.onb-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 24px;
  border-top: 1px solid var(--gray-100);
  background: var(--gray-50);
}
.onb-foot-right { display: flex; gap: 6px; }

/* =========================================================
   Wizard (Scenario Builder, etc.)
   ========================================================= */
.wizard {
  max-width: 1240px;
  margin: 0 auto;
  padding: 20px 32px 32px;
  display: flex; flex-direction: column; gap: 18px;
}
.wizard-head { display: flex; flex-direction: column; gap: 12px; }
.wizard-title-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 24px;
}
.wizard-title-row h1 {
  margin: 0; font-size: 24px; font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--gray-900);
}
.wizard-subtitle {
  font-size: 12px; color: var(--gray-500);
  margin-top: 2px;
}
.wizard-head-actions { display: flex; gap: 6px; }

.wizard-stepper {
  display: flex; align-items: center;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 10px 16px;
  gap: 0;
  overflow-x: auto;
}
.step-pill {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 0;
  flex: 1;
  position: relative;
  min-width: 140px;
}
.step-pill-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--gray-100);
  color: var(--gray-500);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
.step-pill.current .step-pill-num { background: var(--primary-600); color: white; box-shadow: 0 0 0 4px var(--primary-100); }
.step-pill.done .step-pill-num { background: var(--success-500); color: white; }
.step-pill-body { flex: 1; min-width: 0; line-height: 1.2; }
.step-pill-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
  font-weight: 600;
}
.step-pill-name { font-size: 13px; font-weight: 600; color: var(--gray-800); }
.step-pill.current .step-pill-name { color: var(--primary-700); }
.step-pill-conn {
  width: 24px; height: 2px;
  background: var(--gray-200);
  margin: 0 4px;
  flex-shrink: 0;
}
.step-pill.done + .step-pill .step-pill-conn { background: var(--success-300, var(--success-500)); }

.wizard-body {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  min-height: 460px;
}
.wizard-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
}
.wizard-foot-meta { font-size: 12px; color: var(--gray-500); }

.wz-pane { padding: 24px 28px; display: flex; flex-direction: column; gap: 16px; }
.wz-pane-head h2 { margin: 0; font-size: 18px; font-weight: 600; color: var(--gray-900); }
.wz-pane-desc { font-size: 13px; color: var(--gray-600); margin-top: 4px; max-width: 720px; }

/* Template selectable cards */
.template-card.selectable { cursor: pointer; position: relative; }
.template-card.selected {
  border-color: var(--primary-600);
  background: var(--primary-50);
  box-shadow: 0 0 0 2px var(--primary-100);
}
.template-check {
  position: absolute;
  top: 12px; right: 12px;
  color: var(--primary-600);
}

/* Area step */
.wz-area-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 24px;
}
.wz-area-form { display: flex; flex-direction: column; gap: 14px; }
.checkbox-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.checkbox-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--dur-fast);
}
.checkbox-chip input { display: none; }
.checkbox-chip:hover { border-color: var(--gray-300); }
.checkbox-chip.on { background: var(--primary-50); border-color: var(--primary-400); color: var(--primary-700); font-weight: 500; }
.checkbox-chip-meta { margin-left: auto; font-size: 11px; color: var(--gray-400); }
.checkbox-chip.on .checkbox-chip-meta { color: var(--primary-600); }

.radio-card-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.radio-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--dur-fast);
}
.radio-card input { accent-color: var(--primary-600); flex-shrink: 0; }
.radio-card:hover { border-color: var(--gray-300); }
.radio-card.on { background: var(--primary-50); border-color: var(--primary-400); }
.radio-card-name { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.radio-card-desc { font-size: 11px; color: var(--gray-500); margin-top: 1px; }

.wz-area-preview {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.wz-area-preview-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
  font-weight: 600;
}
.wz-mini-map { width: 100%; border-radius: var(--radius-sm); }
.wz-area-summary { display: flex; flex-direction: column; gap: 6px; }
.wz-summary-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px;
  color: var(--gray-600);
}
.wz-summary-row strong { color: var(--gray-900); font-weight: 600; }

/* Indicators step */
.wz-weights-head {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--gray-100);
}
.wz-weight-method { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-600); }
.wz-weight-total {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px;
  padding: 6px 12px;
  background: var(--warning-50);
  color: var(--warning-700);
  border-radius: 999px;
  font-weight: 500;
}
.wz-weight-total.ok { background: var(--success-50); color: var(--success-700); }
.wz-weight-total strong { font-weight: 700; }

.wz-indicators { display: flex; flex-direction: column; gap: 16px; }
.wz-ind-group {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 12px 14px;
}
.wz-ind-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.wz-ind-group-dot { width: 8px; height: 8px; border-radius: 50%; }
.wz-ind-group-name {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.04em; color: var(--gray-700);
}
.wz-ind-row {
  display: grid;
  grid-template-columns: 30px 1fr 200px 40px;
  gap: 12px;
  align-items: center;
  padding: 8px 0;
  border-top: 1px solid var(--gray-100);
}
.wz-ind-row:first-of-type { border-top: none; }
.wz-ind-emoji { font-size: 18px; text-align: center; }
.wz-ind-name { font-size: 13px; font-weight: 500; color: var(--gray-900); }
.wz-ind-desc { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
.weight-range {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--gray-200);
  border-radius: 2px;
  outline: none;
}
.weight-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--track-color, var(--primary-600));
  cursor: pointer;
  border: 3px solid white;
  box-shadow: var(--shadow-sm);
}
.weight-range::-moz-range-thumb {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--track-color, var(--primary-600));
  cursor: pointer;
  border: 3px solid white;
}
.wz-ind-value {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  font-size: 13px;
  color: var(--gray-900);
  text-align: right;
}

/* Constraints */
.wz-constraints { display: flex; flex-direction: column; gap: 8px; }
.wz-constraint-card {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  transition: all var(--dur-fast);
}
.wz-constraint-card.on { background: var(--primary-50); border-color: var(--primary-300); }
.wz-constraint-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  background: var(--gray-100);
  color: var(--gray-600);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.wz-constraint-card.on .wz-constraint-icon {
  background: var(--primary-100);
  color: var(--primary-700);
}
.wz-constraint-body { flex: 1; }
.wz-constraint-name { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.wz-constraint-desc { font-size: 12px; color: var(--gray-600); margin-top: 2px; }

.wz-add-custom {
  padding: 12px 0 0;
  border-top: 1px dashed var(--gray-200);
}
.wz-impact-preview {
  background: var(--info-50);
  border: 1px solid var(--info-500);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-top: 16px;
}
.wz-impact-head { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--info-700); margin-bottom: 8px; }
.wz-impact-bar {
  height: 14px; display: flex;
  border-radius: 4px; overflow: hidden;
  background: var(--gray-100);
  margin-bottom: 6px;
}
.wz-impact-segment.ok { background: var(--success-500); }
.wz-impact-segment.excluded { background: var(--gray-300); }
.wz-impact-legend { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-700); }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.dot.ok { background: var(--success-500); }
.dot.excluded { background: var(--gray-300); }

/* Review */
.wz-review-form { display: flex; flex-direction: column; gap: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-100); }
.wz-review-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 12px;
}
.wz-review-card {
  padding: 12px 14px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
}
.wz-review-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
  font-weight: 600;
}
.wz-review-value { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-top: 2px; }
.wz-review-meta { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
.wz-review-section { margin-top: 14px; }
.wz-review-section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
  font-weight: 600;
  margin-bottom: 8px;
}
.wz-review-ind {
  display: grid;
  grid-template-columns: 120px 1fr 40px;
  gap: 12px;
  align-items: center;
  font-size: 12px;
  padding: 4px 0;
}
.mini-bar { height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
.mini-bar > div { height: 100%; background: var(--primary-500); }
.wz-review-ind strong { text-align: right; color: var(--gray-900); }
.wz-review-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.wz-chip-on {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  background: var(--success-50);
  color: var(--success-700);
  border-radius: 14px;
  font-size: 11px; font-weight: 500;
}
.wz-review-est {
  display: flex; align-items: center; gap: 8px;
  margin-top: 16px;
  padding: 10px 14px;
  background: var(--gray-50);
  border-radius: var(--radius-md);
  font-size: 12px;
  color: var(--gray-700);
}

/* =========================================================
   Group Decision Room
   ========================================================= */
.group-room {
  height: 100%;
  display: flex; flex-direction: column;
}
.group-room-head {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 24px;
  background: white;
  border-bottom: 1px solid var(--gray-200);
  flex-shrink: 0;
}
.group-room-title { display: flex; align-items: center; gap: 10px; flex: 1; }
.group-room-title h2 { margin: 0; font-size: 16px; font-weight: 600; color: var(--gray-900); }
.live-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px;
  background: var(--danger-500);
  color: white;
  border-radius: 14px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.group-room-actions { display: flex; gap: 6px; }

.group-room-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 0;
  min-height: 0;
  background: var(--gray-50);
}
.group-room-left {
  display: flex; flex-direction: column;
  min-width: 0;
  border-right: 1px solid var(--gray-200);
  background: white;
}
.compare-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
}
.compare-tabs { display: flex; gap: 4px; margin-bottom: 6px; }
.compare-tab {
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  color: var(--gray-600);
  background: white;
}
.compare-tab.active { background: var(--primary-600); color: white; border-color: var(--primary-600); }
.compare-tab.side-by-side { margin-left: auto; display: inline-flex; align-items: center; gap: 4px; }
.compare-meta { display: flex; gap: 6px; font-size: 12px; color: var(--gray-600); }

.compare-map {
  flex: 1;
  min-height: 280px;
  position: relative;
  background: linear-gradient(180deg, #F4F7F5 0%, #E0F2FE 100%);
}
.compare-annotation {
  position: absolute;
  top: 12px; left: 12px;
  display: flex; align-items: center; gap: 6px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 6px 10px;
  font-size: 12px;
  box-shadow: var(--shadow-md);
}
.compare-foot { padding: 12px 16px; border-top: 1px solid var(--gray-100); }
.compare-summary-table {
  font-size: 12px;
}
.compare-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 0.8fr;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--gray-100);
}
.compare-row.header {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
}
.compare-row .win { font-weight: 700; color: var(--success-700); }
.win-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
}
.win-badge.win-A { background: var(--success-50); color: var(--success-700); }
.win-badge.win-B { background: var(--warning-50); color: var(--warning-700); }

.group-room-right {
  display: flex; flex-direction: column;
  background: var(--gray-50);
  overflow-y: auto;
  min-height: 0;
}

.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  font-size: 12px; font-weight: 600;
  color: var(--gray-700);
  background: white;
  border-bottom: 1px solid var(--gray-100);
}
.panel-head > span { display: inline-flex; align-items: center; gap: 6px; }

.participants-panel { background: white; border-bottom: 1px solid var(--gray-200); flex-shrink: 0; }
.participants-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 12px 16px;
}
.participant { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.participant-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 10px;
  font-weight: 700;
  position: relative;
}
.participant-status {
  position: absolute;
  bottom: 0; right: 0;
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1.5px solid white;
}
.participant-status.online { background: var(--success-500); }
.participant-tag {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 700;
  padding: 1px 5px;
  background: var(--primary-100);
  color: var(--primary-700);
  border-radius: 3px;
}

.chat-panel {
  background: white;
  border-bottom: 1px solid var(--gray-200);
  flex: 1;
  display: flex; flex-direction: column;
  min-height: 200px;
  max-height: 360px;
}
.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.chat-msg { display: flex; gap: 8px; align-items: flex-start; }
.chat-msg.system .chat-text {
  background: var(--primary-50);
  border: 1px solid var(--primary-100);
  border-radius: var(--radius-md);
  padding: 8px 10px;
  color: var(--gray-800);
}
.chat-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}
.chat-body { flex: 1; min-width: 0; }
.chat-head { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.chat-head strong { color: var(--gray-900); }
.chat-text {
  font-size: 13px;
  color: var(--gray-700);
  line-height: 1.5;
  margin-top: 2px;
}
.chat-form {
  display: flex; gap: 6px;
  padding: 10px 12px;
  border-top: 1px solid var(--gray-100);
}
.chat-form input {
  flex: 1;
  height: 32px; padding: 0 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  font-size: 13px;
  outline: none;
}
.chat-form input:focus { background: white; border-color: var(--primary-400); }

.vote-panel { background: white; }
.vote-options {
  display: flex; flex-direction: column; gap: 6px;
  padding: 12px 16px;
}
.vote-row {
  width: 100%;
  display: flex; flex-direction: column; gap: 6px;
  padding: 10px 12px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  background: white;
  text-align: left;
  transition: all var(--dur-fast);
}
.vote-row:hover { border-color: var(--gray-300); }
.vote-row.voted { border-color: var(--primary-400); background: var(--primary-50); }
.vote-row-head { display: flex; align-items: center; gap: 10px; }
.vote-circle {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.vote-check { color: white; }
.vote-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--gray-900); }
.vote-count { font-size: 14px; color: var(--gray-700); font-variant-numeric: tabular-nums; }
.vote-bar {
  height: 4px;
  background: var(--gray-100);
  border-radius: 2px;
  overflow: hidden;
}
.vote-bar > div { height: 100%; transition: width var(--dur-base); }
.vote-foot {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 16px;
  border-top: 1px solid var(--gray-100);
  font-size: 11px;
  color: var(--gray-600);
}

/* =========================================================
   Report Builder
   ========================================================= */
.report-builder {
  display: flex; flex-direction: column;
  height: 100%;
  min-height: 0;
}
.rb-head {
  padding: 16px 24px;
  background: white;
  border-bottom: 1px solid var(--gray-200);
  display: flex; flex-direction: column; gap: 10px;
}
.rb-title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
.rb-title-row h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
.rb-head-actions { display: flex; gap: 6px; }
.rb-meta-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--gray-100);
}
.rb-meta-item { display: flex; flex-direction: column; gap: 4px; }
.rb-meta-item label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
  font-weight: 600;
}

.rb-body {
  flex: 1;
  display: grid;
  grid-template-columns: 240px 1fr 340px;
  gap: 0;
  min-height: 0;
  overflow: hidden;
}
.rb-palette {
  background: white;
  border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.rb-palette-head {
  padding: 12px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
  font-weight: 700;
  border-bottom: 1px solid var(--gray-100);
}
.rb-palette-list { display: flex; flex-direction: column; padding: 8px; gap: 2px; }
.rb-palette-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px;
  border-radius: var(--radius-sm);
  background: white;
  text-align: left;
  transition: background var(--dur-fast);
  cursor: grab;
}
.rb-palette-item:hover { background: var(--gray-50); }
.rb-palette-item:active { cursor: grabbing; }
.rb-palette-icon {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  background: var(--primary-50);
  color: var(--primary-700);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.rb-palette-body { flex: 1; min-width: 0; }
.rb-palette-name { font-size: 12px; font-weight: 600; color: var(--gray-900); }
.rb-palette-desc { font-size: 10px; color: var(--gray-500); margin-top: 1px; line-height: 1.4; }
.rb-palette-add { color: var(--gray-300); }
.rb-palette-item:hover .rb-palette-add { color: var(--primary-600); }

.rb-canvas {
  background: var(--gray-50);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.rb-canvas-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 20px;
  background: white;
  border-bottom: 1px solid var(--gray-200);
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-700);
}
.rb-sections {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex; flex-direction: column; gap: 6px;
}
.rb-section {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--dur-fast);
}
.rb-section:hover { border-color: var(--gray-300); box-shadow: var(--shadow-sm); }
.rb-section.selected { border-color: var(--primary-500); background: var(--primary-50); box-shadow: 0 0 0 2px var(--primary-100); }
.rb-section-handle { color: var(--gray-300); cursor: grab; }
.rb-section-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--gray-100);
  color: var(--gray-600);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
}
.rb-section.selected .rb-section-num { background: var(--primary-600); color: white; }
.rb-section-body { flex: 1; min-width: 0; }
.rb-section-title { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.rb-section-desc { font-size: 11px; color: var(--gray-500); }
.rb-section-actions { display: flex; gap: 2px; }
.rb-section-actions button {
  width: 24px; height: 24px;
  border-radius: var(--radius-sm);
  color: var(--gray-400);
}
.rb-section-actions button:hover:not(:disabled) { background: var(--gray-100); color: var(--gray-700); }
.rb-section-actions button:disabled { opacity: 0.3; cursor: not-allowed; }

.rb-add-section {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 16px;
  background: transparent;
  border: 2px dashed var(--gray-300);
  border-radius: var(--radius-md);
  color: var(--gray-500);
  font-size: 12px;
  font-weight: 500;
  margin-top: 4px;
}
.rb-add-section:hover { border-color: var(--primary-400); color: var(--primary-700); background: var(--primary-50); }

.rb-preview {
  background: white;
  border-left: 1px solid var(--gray-200);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.rb-preview-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--gray-100);
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-700);
}
.rb-preview-canvas {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  background: var(--gray-50);
}
.rb-empty {
  padding: 32px;
  text-align: center;
  color: var(--gray-400);
  font-size: 13px;
}
.rb-section-pill {
  display: inline-block;
  padding: 2px 8px;
  background: var(--primary-100);
  color: var(--primary-700);
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.rb-text-block {
  background: white;
  padding: 16px 18px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}
.rb-text-block h4 { margin: 0 0 6px; font-size: 14px; color: var(--gray-900); }
.rb-text-block p { font-size: 12px; line-height: 1.6; margin: 0 0 6px; color: var(--gray-700); }

.rb-kpi-block {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  background: white;
  padding: 12px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}
.rb-kpi-mini { padding: 8px; background: var(--gray-50); border-radius: var(--radius-sm); }
.rb-kpi-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-500); font-weight: 600; }
.rb-kpi-val { font-size: 18px; font-weight: 700; color: var(--gray-900); margin-top: 2px; }

.rb-map-block {
  background: white;
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  position: relative;
  height: 200px;
}
.rb-chart-block {
  background: white;
  padding: 12px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}
.rb-chart-svg { width: 100%; }
.rb-chart-legend { font-size: 10px; color: var(--gray-500); margin-top: 4px; }

.rb-table-block {
  background: white;
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.rb-table-block table { width: 100%; border-collapse: collapse; font-size: 11px; }
.rb-table-block th { padding: 8px 10px; background: var(--gray-50); text-align: left; font-size: 10px; text-transform: uppercase; color: var(--gray-500); }
.rb-table-block td { padding: 6px 10px; border-bottom: 1px solid var(--gray-100); }

.rb-rec-block {
  background: white;
  padding: 14px 18px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}
.rb-rec-block ol {
  margin: 8px 0 0; padding-left: 20px;
  font-size: 12px; line-height: 1.6;
  color: var(--gray-700);
}
.rb-rec-block ol li { margin-bottom: 4px; }

.rb-cover {
  background: white;
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.rb-cover-svg { width: 100%; display: block; }

.rb-config {
  border-top: 1px solid var(--gray-200);
  padding: 12px 16px;
  background: white;
}
.rb-config-head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-500); margin-bottom: 6px; }
.rb-config-rows { display: flex; flex-direction: column; gap: 4px; }
.rb-config-rows label {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--gray-700);
}

/* =========================================================
   Crisis Dashboard
   ========================================================= */
.crisis-dash {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: 20px 32px 48px;
  display: flex; flex-direction: column; gap: 20px;
}
.crisis-hero {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 24px;
  background: linear-gradient(135deg, #F7E6E3 0%, white 100%);
  border: 1px solid var(--danger-200, #F3D4CD);
  border-left: 4px solid var(--danger-600);
  border-radius: var(--radius-xl);
  padding: 24px 28px;
}
.crisis-hero-left { display: flex; flex-direction: column; gap: 8px; }
.crisis-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  background: var(--danger-600);
  color: white;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  align-self: flex-start;
  animation: pulseDot 1.6s infinite;
}
.crisis-hero h1 {
  margin: 4px 0 0;
  font-size: 28px;
  font-weight: 700;
  color: var(--gray-900);
  letter-spacing: -0.01em;
}
.crisis-area { font-size: 14px; color: var(--gray-700); font-weight: 500; }
.crisis-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 12px 0;
}
.crisis-stat {
  padding: 10px 12px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
}
.crisis-stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
  font-weight: 600;
}
.crisis-stat-value { font-size: 20px; font-weight: 700; color: var(--danger-700); margin-top: 2px; }
.crisis-stat-value.sm { font-size: 13px; font-weight: 600; }
.crisis-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.primary-btn.danger { background: var(--danger-600); }
.primary-btn.danger:hover { background: var(--danger-700); }

.crisis-hero-right { display: flex; align-items: stretch; }
.crisis-mini-map {
  flex: 1;
  background: linear-gradient(180deg, #F4F7F5 0%, #E0F2FE 100%);
  border-radius: var(--radius-md);
  position: relative;
  overflow: hidden;
  min-height: 220px;
  border: 1px solid var(--gray-200);
}

.crisis-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.crisis-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column;
}
.crisis-card-head {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-900);
}
.crisis-card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.crisis-mini-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--gray-700);
}
.crisis-timeline-row {
  display: grid;
  grid-template-columns: 50px 16px 1fr;
  gap: 8px;
  font-size: 12px;
  align-items: start;
  padding: 4px 0;
}
.crisis-time {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  color: var(--gray-500);
}
.crisis-timeline-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--danger-500);
  margin-top: 4px;
  position: relative;
}
.crisis-timeline-row:not(:last-child) .crisis-timeline-dot::after {
  content: ""; position: absolute;
  top: 10px; left: 3px;
  width: 2px; height: 16px;
  background: var(--gray-200);
}
.crisis-proj { width: 100%; }
.crisis-proj-meta { font-size: 11px; color: var(--gray-500); margin-top: 6px; }
.crisis-update {
  display: flex; gap: 10px;
  padding: 8px 10px;
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  font-size: 12px;
}
.crisis-update-time {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  color: var(--gray-500);
  white-space: nowrap;
}

@media (max-width: 1240px) {
  .group-room-body { grid-template-columns: 1fr; }
  .rb-body { grid-template-columns: 1fr; }
  .rb-palette, .rb-preview { display: none; }
  .crisis-hero { grid-template-columns: 1fr; }
  .crisis-grid { grid-template-columns: 1fr; }
  .wz-area-layout { grid-template-columns: 1fr; }
  .wz-review-summary { grid-template-columns: repeat(2, 1fr); }
  .onb-step-grid { grid-template-columns: 1fr; }
}

/* =========================================================
   SESI 4 — Feature pages (MCDA, Vuln, Hindcast, Sensitivity, EWS)
   ========================================================= */
.feat-page {
  max-width: 1440px;
  margin: 0 auto;
  padding: 20px 32px 32px;
  display: flex; flex-direction: column; gap: 18px;
}
.feat-head { display: flex; flex-direction: column; gap: 12px; }
.feat-head-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 24px;
}
.feat-title-block {
  display: flex; align-items: flex-start; gap: 16px;
}
.feat-icon {
  width: 52px; height: 52px;
  border-radius: var(--radius-lg);
  background: var(--primary-100);
  color: var(--primary-700);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.feat-badge {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--gray-400);
  letter-spacing: 0.06em;
}
.feat-head h1 {
  margin: 2px 0;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--gray-900);
}
.feat-sub { font-size: 13px; color: var(--gray-600); max-width: 720px; }
.feat-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ----- MCDA Engine ----- */
.mcda-body {
  display: grid;
  grid-template-columns: 320px 1fr 340px;
  gap: 16px;
  min-height: 600px;
}
.mcda-left, .mcda-right {
  display: flex; flex-direction: column; gap: 16px;
  overflow-y: auto;
}
.mcda-center {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column;
  overflow: hidden;
  min-height: 600px;
}
.mcda-panel {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.mcda-panel-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
}
.mcda-panel-title { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.mcda-panel-sub { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
.mcda-panel-sub .ok { color: var(--success-700); }
.mcda-panel-sub .warn { color: var(--warning-700); }

.mcda-criteria-list { display: flex; flex-direction: column; padding: 4px 0; }
.mcda-criterion {
  padding: 10px 16px;
  border-bottom: 1px solid var(--gray-100);
  display: flex; flex-direction: column; gap: 4px;
}
.mcda-criterion:last-child { border-bottom: none; }
.mcda-c-head { display: flex; justify-content: space-between; align-items: center; }
.mcda-c-name { font-size: 12px; font-weight: 500; color: var(--gray-900); }
.mcda-c-val { font-size: 12px; font-weight: 600; color: var(--primary-700); font-variant-numeric: tabular-nums; }
.mcda-c-meta { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--gray-500); margin-top: 2px; }
.mcda-dir {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-size: 9px;
}
.mcda-dir.dir-maximize { background: var(--success-50); color: var(--success-700); }
.mcda-dir.dir-minimize { background: var(--danger-50); color: var(--danger-700); }

.mcda-method { padding: 10px 16px; border-bottom: 1px solid var(--gray-100); }
.mcda-method:last-of-type { border-bottom: none; }
.mcda-method-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: 6px;
}
.mcda-method-meta {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 10px 16px;
  font-size: 11px;
  color: var(--gray-600);
  background: var(--gray-50);
  border-top: 1px solid var(--gray-100);
}
.mcda-method-meta strong { color: var(--gray-900); }

.mcda-constraints { padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; }
.mcda-cn { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-700); cursor: pointer; }
.mcda-cn input { accent-color: var(--primary-600); }

.mcda-result-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
}
.mcda-result-title {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: var(--gray-900);
  margin-bottom: 4px;
}
.mcda-result-meta { display: flex; gap: 6px; font-size: 11px; color: var(--gray-500); }
.mcda-result-meta strong { color: var(--gray-700); }
.mcda-result-map {
  flex: 1;
  position: relative;
  background: linear-gradient(180deg, #F4F7F5 0%, #E0F2FE 100%);
  min-height: 420px;
}

.mcda-ranking { display: flex; flex-direction: column; padding: 4px 0; max-height: 380px; overflow-y: auto; }
.mcda-rank-row {
  display: grid;
  grid-template-columns: 28px 1fr 70px 30px 28px;
  gap: 6px;
  align-items: center;
  padding: 6px 14px;
  border: none;
  background: white;
  text-align: left;
  transition: background var(--dur-fast);
  font-size: 12px;
}

.mcda-histogram { padding: 12px 16px; }

.vuln-stacked { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

}

.vuln-lineage { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }

}

/* ----- Hindcasting Tool ----- */
.hind-controls {

.sens-insight {

}

.uncert-chart { padding: 12px 16px; }

.uncert-legend {

}

.rank-stability { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

}

/* ----- Anomaly Detection & EWS ----- */

}
.ews-status-card {
  display: flex; align-items: center; gap: 12px;

}

.ews-alert-list { display: flex; flex-direction: column; gap: 10px; }
.ews-alert {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 14px 16px 14px 24px;

}
.ews-alert-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }

.ews-alert-icon {

}

.ews-alert.sev-medium .ews-alert-icon { background: var(--warning-50); color: var(--warning-700); }

}

.ews-alert-type { font-size: 13px; font-weight: 600; color: var(--gray-900); }

.ews-alert-trigger { font-size: 12px; color: var(--gray-600); margin-top: 4px; }

@media (max-width: 1240px) {

  .sens-grid { grid-template-columns: 1fr; }
  .ews-status-row { grid-template-columns: repeat(2, 1fr); }

}

/* =========================================================
   FITUR 2.6 — Flood & Drought Modeler
   ========================================================= */
.fm-modes {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}

}
.fm-mode:hover { border-color: var(--gray-300); color: var(--gray-900); }

.fm-live-badge {

.fm-body {

.fm-radio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }

.fm-radio-row {

.fm-custom { display: flex; flex-direction: column; gap: 10px; }
.fm-field { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--gray-600); font-weight: 500; }
.fm-run { width: 100%; justify-content: center; margin-top: 2px; }
.fm-run-note { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--gray-500); }

.fm-check { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-700); padding: 3px 0; }

.fm-manage { margin-top: 8px; }

.fm-center { min-width: 0; }
.fm-map-card { background: var(--surface, white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; }
.fm-map-head {

.fm-depth-legend .sw { width: 12px; height: 12px; border-radius: 2px; }
.fm-map-stage { position: relative; height: 400px; background: var(--surface-sunken, #E9EEEA); }
.fm-svg { width: 100%; height: 100%; display: block; }
.fm-running-overlay {

/* =========================================================
   FITUR 5.8 — What-If Quick Simulator
   ========================================================= */
.whatif-body {
  display: grid;
  grid-template-columns: 320px 1fr 300px;
  gap: 16px;
  align-items: start;
}
.whatif-panel {
  background: var(--surface, white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 14px;
}
.whatif-panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-900);
}
.whatif-panel-head > span:first-child { display: inline-flex; align-items: center; gap: 6px; }

.whatif-controls, .whatif-right { display: flex; flex-direction: column; }

.whatif-region {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  color: var(--gray-500);
}
.whatif-region select { flex: 1; }
.whatif-region-meta {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 16px 14px;
}
.whatif-region-meta > div { display: flex; flex-direction: column; gap: 1px; font-size: 11px; }
.whatif-region-meta strong { font-size: 13px; color: var(--gray-900); font-variant-numeric: tabular-nums; }

.whatif-status {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
}
.whatif-status.computing { background: var(--warning-50); color: var(--warning-700); }
.whatif-status.done { background: var(--success-50); color: var(--success-700); }
.whatif-spinner {
  width: 9px; height: 9px;
  border: 1.5px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 700ms linear infinite;
}

.whatif-sliders { padding: 14px 16px; display: flex; flex-direction: column; gap: 16px; }
.whatif-slider-row { display: flex; flex-direction: column; gap: 6px; }
.whatif-slider-top { display: flex; align-items: center; justify-content: space-between; }
.whatif-slider-label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; color: var(--gray-800);
}
.whatif-emoji { font-size: 14px; }
.whatif-slider-val { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
.whatif-range { width: 100%; }
.whatif-slider-hint { font-size: 10px; color: var(--gray-500); }

.whatif-usecase {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 12px 14px;
  background: var(--surface-sunken, var(--gray-100));
  border-radius: var(--radius-lg);
  align-items: center;
}
.whatif-usecase-label { font-size: 11px; font-weight: 600; color: var(--gray-600); width: 100%; }
.whatif-usecase-btn {
  font-size: 11px;
  padding: 4px 10px;
  background: var(--surface, white);
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  color: var(--gray-700);
  transition: all var(--dur-fast);
}
.whatif-usecase-btn:hover { border-color: var(--primary-400); color: var(--primary-700); }

/* Center */
.whatif-center { display: flex; flex-direction: column; gap: 16px; }
.whatif-outcomes {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.whatif-outcome {
  background: var(--surface, white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  transition: opacity var(--dur-fast);
}
.whatif-outcome.computing { opacity: 0.55; }
.whatif-outcome-head {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  color: var(--gray-500);
}
.whatif-outcome-val, .whatif-outcome-vuln {
  display: flex; align-items: baseline; gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.whatif-outcome-vuln { align-items: center; }
.whatif-base {
  font-size: 15px;
  color: var(--gray-400);
  font-variant-numeric: tabular-nums;
}
.whatif-now {
  font-size: 26px;
  font-weight: 700;
  color: var(--gray-900);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}
.whatif-outcome-vuln .whatif-now { font-size: 24px; }
.whatif-unit { font-size: 12px; color: var(--gray-500); }
.whatif-outcome-foot { margin-top: 6px; }
.whatif-delta {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
}
.whatif-delta.worse { background: var(--risk-5-soft, var(--danger-50)); color: var(--risk-5, var(--danger-700)); }
.whatif-delta.better { background: var(--success-50); color: var(--success-700); }
.whatif-delta.flat { background: var(--gray-100); color: var(--gray-500); }
.whatif-unit-inline { font-size: 11px; color: var(--gray-500); }

.whatif-map-card {
  background: var(--surface, white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.whatif-map-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
  flex-wrap: wrap;
  gap: 8px;
}
.whatif-map-legend { display: flex; gap: 12px; font-size: 11px; color: var(--gray-600); }
.whatif-map-legend > span { display: inline-flex; align-items: center; gap: 4px; }
.whatif-map-legend .dot { width: 9px; height: 9px; border-radius: 50%; }
.whatif-map-stage {
  height: 360px;
  background: var(--surface-sunken, #E9EEEA);
}
.whatif-svg { width: 100%; height: 100%; display: block; }

/* Right */
.whatif-summary { padding: 8px 0; }
.whatif-sum-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 16px;
  border-bottom: 1px solid var(--gray-100);
  font-size: 12px;
}
.whatif-sum-row:last-child { border-bottom: none; }
.whatif-sum-label { color: var(--gray-600); }
.whatif-sum-delta { font-weight: 700; font-variant-numeric: tabular-nums; }
.whatif-sum-delta.worse { color: var(--risk-5, var(--danger-700)); }
.whatif-sum-delta.better { color: var(--success-700); }
.whatif-sum-delta.flat { color: var(--gray-500); }

.whatif-ai-note { background: var(--primary-50); border-color: var(--primary-100); }
.whatif-ai-note .whatif-panel-head { border-color: var(--primary-100); color: var(--primary-700); }
.whatif-ai-body { padding: 12px 16px; font-size: 12px; line-height: 1.6; color: var(--gray-700); }
.whatif-ai-body p { margin: 0 0 8px; }
.whatif-ai-body strong { color: var(--gray-900); }

.whatif-save {
  background: var(--surface, white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
}
.whatif-save-btn { width: 100%; justify-content: center; }
.whatif-save-note {
  display: flex; align-items: flex-start; gap: 6px;
  margin-top: 10px;
  font-size: 11px;
  color: var(--gray-500);
  line-height: 1.5;
}
.whatif-saved {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--success-50);
  border-radius: var(--radius-md);
  color: var(--success-700);
  font-size: 12px;

.whatif-saved strong { display: block; }

@media (max-width: 1240px) {
  .whatif-body { grid-template-columns: 1fr; }
  .whatif-outcomes { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 680px) {
  .whatif-outcomes { grid-template-columns: 1fr; }
  .whatif-region-meta { grid-template-columns: 1fr 1fr; }

   SESI 5 — Polish: Public landing, Shortcuts, Mobile nav, States
   ========================================================= */

/* ---------- Dark Mode ---------- */
/* ---------- Dark Mode (Arah 4 layer · Mission Control) ---------- */
:root[data-theme="dark"] {
  /* Neutrals inverted — dark surfaces, light text */
  --gray-50:  #0B1220;       /* deep navy bg */
  --gray-100: #131C2E;       /* surface */
  --gray-200: #1E2A45;       /* surface-elevated / border subtle */
  --gray-300: #334063;       /* border strong */
  --gray-400: #64748B;
  --gray-500: #94A3B8;       /* muted text */
  --gray-600: #CBD5E1;       /* secondary text */
  --gray-700: #E2E8F0;
  --gray-800: #F1F5F9;
  --gray-900: #F8FAFC;       /* primary text */

  /* Brand in dark — electric sky-blue (Arah 1 Mission Control) */
  --primary-50:  #14283D;
  --primary-100: #1B3953;
  --primary-200: #245379;
  --primary-300: #3784A2;
  --primary-400: #38BDF8;
  --primary-500: #38BDF8;
  --primary-600: #38BDF8;
  --primary-700: #7DD3FC;
  --primary-800: #BAE6FD;
  --primary-900: #E0F2FE;

  /* Accents stay vivid in dark */
  --accent-sea:    #22D3EE;
  --accent-forest: #34D399;
  --accent-sunset: #FBBF24;

  /* Semantic surfaces — dark-tinted backgrounds */
  --success-50: #0F3E29;
  --success-500: #34D399;
  --success-700: #5B8C5A;
  --warning-50: #3A2C0F;
  --warning-500: #FBBF24;
  --warning-700: #E9A352;
  --danger-50:  #3A1414;
  --danger-500: #EF4444;
  --danger-600: #DC2626;
  --danger-700: #C44E37;
  --info-50:    #143240;
  --info-500:   #22D3EE;
  --info-700:   #38BDF8;

  /* Risk colors in dark — higher saturation pop */
  --risk-1: #3B82F6;
  --risk-2: #22C55E;
  --risk-3: #FBBF24;
  --risk-4: #F97316;
  --risk-5: #EF4444;
}
:root[data-theme="dark"] body { background: #060A14; color: var(--gray-900); }
/* Explicit dark mode for top-level layout — content area must follow */
:root[data-theme="dark"] .app,
:root[data-theme="dark"] .main,
:root[data-theme="dark"] .content,
:root[data-theme="dark"] .dashboard,
:root[data-theme="dark"] .module-landing,
:root[data-theme="dark"] .feat-page,
:root[data-theme="dark"] .wizard,
:root[data-theme="dark"] .map-explorer,
:root[data-theme="dark"] .state-patterns,
:root[data-theme="dark"] .crisis-dash,
:root[data-theme="dark"] .report-builder,
:root[data-theme="dark"] .group-room {
  background: #060A14;
  color: var(--gray-900);
}
:root[data-theme="dark"] .pub-section.alt-bg,
:root[data-theme="dark"] .public-landing,
:root[data-theme="dark"] .pub-hero,
:root[data-theme="dark"] .pub-section { background: #060A14; color: var(--gray-900); }
:root[data-theme="dark"] .pub-section h2,
:root[data-theme="dark"] .pub-story-body h3,
:root[data-theme="dark"] h1, :root[data-theme="dark"] h2, :root[data-theme="dark"] h3 { color: var(--gray-900); }
:root[data-theme="dark"] .topbar,
:root[data-theme="dark"] .sidebar,
:root[data-theme="dark"] .contextbar,
:root[data-theme="dark"] .card,
:root[data-theme="dark"] .kpi-card,
:root[data-theme="dark"] .modtile,
:root[data-theme="dark"] .feature-card,
:root[data-theme="dark"] .module-stat,
:root[data-theme="dark"] .quick-btn,
:root[data-theme="dark"] .ghost-btn,
:root[data-theme="dark"] .hero-stat,
:root[data-theme="dark"] .ctx-picker-btn,
:root[data-theme="dark"] .map-overlay-tr,
:root[data-theme="dark"] .legend,
:root[data-theme="dark"] .search-modal,
:root[data-theme="dark"] .ai-drawer,
:root[data-theme="dark"] .dropdown,
:root[data-theme="dark"] .ai-input,
:root[data-theme="dark"] .text-input,
:root[data-theme="dark"] .chat-form input,
:root[data-theme="dark"] .table-card,
:root[data-theme="dark"] .session-card,
:root[data-theme="dark"] .ews-alert,
:root[data-theme="dark"] .ews-status-card,
:root[data-theme="dark"] .integration-card,
:root[data-theme="dark"] .about-link-row,
:root[data-theme="dark"] .pipeline-stage,
:root[data-theme="dark"] .settings-pane,
:root[data-theme="dark"] .crisis-card,
:root[data-theme="dark"] .wizard-body,
:root[data-theme="dark"] .wizard-foot,
:root[data-theme="dark"] .wizard-stepper,
:root[data-theme="dark"] .mcda-center,
:root[data-theme="dark"] .mcda-panel,
:root[data-theme="dark"] .hind-metric,
:root[data-theme="dark"] .hind-controls,
:root[data-theme="dark"] .sens-controls {
  background: #0B1220;
  color: var(--gray-900);
  border-color: #131C2E;
}
:root[data-theme="dark"] .data-table th { background: #131C2E; }
:root[data-theme="dark"] .data-table tr:hover td { background: #131C2E; }
:root[data-theme="dark"] .map-stage,
:root[data-theme="dark"] .vuln-map,
:root[data-theme="dark"] .map-canvas,
:root[data-theme="dark"] .compare-map,
:root[data-theme="dark"] .crisis-mini-map,
:root[data-theme="dark"] .mcda-result-map { background: linear-gradient(180deg, #0B1220 0%, #131C2E 100%); }
:root[data-theme="dark"] .search-trigger { background: #131C2E; }
:root[data-theme="dark"] .search-trigger:hover { background: #1E2A45; }
:root[data-theme="dark"] .ai-input,
:root[data-theme="dark"] .text-input { background: #131C2E; color: #F4F7F5; }
:root[data-theme="dark"] kbd { background: #1E2A45; border-color: #334063; color: #F4F7F5; }
:root[data-theme="dark"] .kbd-inline { background: #131C2E; }

/* ---------- Public Landing ---------- */
.public-landing {
  min-height: 100vh;
  background: white;
  display: flex; flex-direction: column;
  overflow-y: auto;
  height: 100vh;
}
.pub-nav {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--gray-200);
  z-index: 10;
}
.pub-nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 14px 32px;
  display: flex; align-items: center; gap: 32px;
}
.pub-nav-links {
  display: flex; gap: 4px;
  flex: 1;
}
.pub-nav-links button {
  padding: 6px 12px;
  font-size: 13px; font-weight: 500;
  color: var(--gray-600);
  border-radius: var(--radius-md);
}
.pub-nav-links button:hover { background: var(--gray-50); color: var(--gray-900); }
.pub-nav-links button.active { color: var(--primary-700); }
.pub-nav-actions { display: flex; gap: 8px; align-items: center; }

.pub-hero {
  padding: 64px 32px;
  background: linear-gradient(180deg, #FBFCFA 0%, white 100%);
}
.pub-hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: center;
}
.pub-hero-tag {
  display: inline-block;
  padding: 4px 12px;
  background: var(--primary-100);
  color: var(--primary-700);
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  margin-bottom: 16px;
}
.pub-hero-text h1 {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0 0 20px;
  color: var(--gray-900);
  text-wrap: balance;
}
.pub-hero-sub {
  font-size: 17px;
  color: var(--gray-600);
  line-height: 1.6;
  max-width: 560px;
  margin: 0 0 28px;
}
.pub-hero-actions { display: flex; gap: 10px; margin-bottom: 32px; }
.pub-hero-actions .primary-btn,
.pub-hero-actions .ghost-btn { padding: 10px 20px; font-size: 14px; }
.pub-hero-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding-top: 20px;
  border-top: 1px solid var(--gray-200);
}
.pub-hero-stats > div { font-size: 13px; color: var(--gray-500); }
.pub-hero-stats strong {
  display: block;
  font-size: 28px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 2px;
  letter-spacing: -0.01em;
}
.pub-hero-visual { display: flex; justify-content: center; }
.pub-hero-svg { width: 100%; max-width: 480px; border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); }

.pub-section { padding: 64px 32px; }
.pub-section.alt-bg { background: var(--gray-50); }
.pub-section-inner { max-width: 1200px; margin: 0 auto; }
.pub-section-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 32px;
  gap: 24px;
  flex-wrap: wrap;
}
.pub-section-head h2 {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0;
  color: var(--gray-900);
}
.pub-section-head p { font-size: 14px; color: var(--gray-600); margin: 6px 0 0; }
.pub-filter { display: flex; gap: 4px; flex-wrap: wrap; }
.pub-filter-btn {
  padding: 6px 12px;
  font-size: 12px; font-weight: 500;
  color: var(--gray-600);
  border-radius: 14px;
  border: 1px solid var(--gray-200);
  background: white;
}
.pub-filter-btn.active { background: var(--gray-900); color: white; border-color: var(--gray-900); }
.pub-filter-btn:hover:not(.active) { background: var(--gray-50); }

.pub-alerts {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.pub-alert {
  position: relative;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 16px 20px 16px 24px;
  overflow: hidden;
}
.pub-alert-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.pub-alert.sev-high .pub-alert-stripe { background: var(--danger-500); }
.pub-alert.sev-medium .pub-alert-stripe { background: var(--warning-500); }
.pub-alert.sev-low .pub-alert-stripe { background: var(--info-500); }
.pub-alert-type {
  font-size: 11px;
  font-weight: 700;
  color: var(--gray-500);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.pub-alert-area { font-size: 16px; font-weight: 600; color: var(--gray-900); margin-top: 4px; }
.pub-alert-desc { font-size: 13px; color: var(--gray-600); margin-top: 6px; line-height: 1.5; }
.pub-alert-time { font-size: 11px; color: var(--gray-400); margin-top: 8px; }

.pub-stories-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
.pub-story {
  background: white;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: all var(--dur-fast);
  cursor: pointer;
}
.pub-story:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }
.pub-story-thumb { position: relative; height: 200px; overflow: hidden; }
.story-svg { width: 100%; height: 100%; display: block; }
.pub-story-cat {
  position: absolute;
  top: 12px; left: 12px;
  padding: 4px 10px;
  background: rgba(255,255,255,0.95);
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-700);
  letter-spacing: 0.02em;
}
.pub-story-body { padding: 20px 22px; }
.pub-story-body h3 {
  margin: 0 0 8px;
  font-size: 20px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.01em;
  color: var(--gray-900);
  text-wrap: balance;
}
.pub-story-body p {
  font-size: 14px;
  color: var(--gray-600);
  line-height: 1.6;
  margin: 0 0 12px;
}
.pub-story-meta {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px;
  color: var(--gray-400);
}
.pub-story-meta span { display: inline-flex; align-items: center; gap: 4px; }

.pub-subscribe {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: center;
  background: linear-gradient(135deg, var(--primary-50) 0%, white 100%);
  border: 1px solid var(--primary-100);
  border-radius: var(--radius-2xl);
  padding: 40px;
}
.pub-subscribe-tag {
  display: inline-block;
  padding: 4px 12px;
  background: white;
  color: var(--primary-700);
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 12px;
}
.pub-subscribe h2 { margin: 0 0 8px; font-size: 26px; }
.pub-subscribe p { margin: 0; color: var(--gray-600); font-size: 14px; }
.pub-subscribe-form {
  display: flex; gap: 8px;
}
.pub-subscribe-form input {
  flex: 1;
  height: 44px;
  padding: 0 16px;
  background: white;
  border: 1px solid var(--gray-300);
  border-radius: var(--radius-md);
  font-size: 14px;
  outline: none;
}
.pub-subscribe-form input:focus { border-color: var(--primary-400); box-shadow: 0 0 0 3px var(--primary-100); }
.pub-subscribe-form .primary-btn { height: 44px; padding: 0 20px; font-size: 14px; }

.pub-footer {
  background: var(--gray-900);
  color: var(--gray-400);
  margin-top: auto;
}
.pub-footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 56px 32px 32px;
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 64px;
}
.pub-footer-sub { font-size: 12px; color: var(--gray-500); margin-top: 6px; }
.pub-footer-cols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.pub-footer-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: white;
  margin-bottom: 10px;
}
.pub-footer-cols button {
  display: block;
  text-align: left;
  font-size: 13px;
  padding: 3px 0;
  color: var(--gray-400);
}
.pub-footer-cols button:hover { color: white; }
.pub-footer-bottom {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 32px;
  border-top: 1px solid #131C2E;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 11px;
  color: var(--gray-500);
}

/* ---------- Keyboard Shortcut Overlay ---------- */
.kbd-scrim {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.55);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 32px;
  animation: fadeIn 200ms var(--ease-out);
}
.kbd-modal {
  width: 880px;
  max-width: 100%;
  background: white;
  border-radius: var(--radius-2xl);
  box-shadow: var(--shadow-2xl);
  display: flex; flex-direction: column;
  max-height: 90vh;
  overflow: hidden;
  animation: searchPop 200ms var(--ease-out);
}
.kbd-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 24px 28px 16px;
  border-bottom: 1px solid var(--gray-100);
}
.kbd-head h2 { margin: 0; font-size: 20px; font-weight: 600; }
.kbd-head p { margin: 2px 0 0; font-size: 13px; color: var(--gray-500); }
.kbd-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px 28px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px 40px;
}
.kbd-section { display: flex; flex-direction: column; gap: 4px; }
.kbd-section-label {
  font-size: 11px;
  text-transform: uppercase;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--gray-500);
  margin-bottom: 6px;
}
.kbd-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 12px;
  align-items: center;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
}
.kbd-row:hover { background: var(--gray-50); }
.kbd-keys { display: flex; gap: 2px; }
.kbd-desc { font-size: 12px; color: var(--gray-700); }
.kbd-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 28px;
  border-top: 1px solid var(--gray-100);
  background: var(--gray-50);
  font-size: 12px;
  color: var(--gray-500);
}

/* ---------- Mobile Bottom Nav ---------- */
.mobile-bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1px solid var(--gray-200);
  height: 60px;
  z-index: 60;
}
.mb-nav-item {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px;
  font-size: 10px;
  color: var(--gray-500);
  font-weight: 500;
}
.mb-nav-item.active { color: var(--primary-600); }
.mb-nav-item:active { background: var(--gray-50); }

@media (max-width: 768px) {
  .mobile-bottom-nav { display: flex; }
  .sidebar { display: none; }
  .floating-ai { bottom: 80px; }
  .statusbar { display: none; }
  .main { padding-bottom: 60px; }
  .pub-hero-inner,
  .pub-stories-grid,
  .pub-subscribe,
  .pub-footer-inner,
  .pub-alerts { grid-template-columns: 1fr !important; }
  .pub-hero-text h1 { font-size: 32px; }
  .pub-hero-stats { grid-template-columns: repeat(2, 1fr); }
  .pub-footer-cols { grid-template-columns: repeat(2, 1fr); }
  .kbd-grid { grid-template-columns: 1fr; }
  .ai-drawer { width: 100% !important; }
}

/* ---------- State Patterns Showcase ---------- */
.state-patterns {
  max-width: 1240px;
  margin: 0 auto;
  padding: 20px 32px 48px;
  display: flex; flex-direction: column; gap: 32px;
}
.state-section h3 {
  margin: 0 0 4px;
  font-size: 18px;
  font-weight: 600;
}
.state-section-desc {
  font-size: 13px;
  color: var(--gray-600);
  margin: 0 0 16px;
}
.state-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.state-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.state-meta {
  padding: 8px 14px;
  background: var(--gray-50);
  border-top: 1px solid var(--gray-100);
  font-size: 11px;
  color: var(--gray-500);
  font-weight: 500;
  font-family: "JetBrains Mono", monospace;
}

/* Empty */
.state-empty {
  padding: 36px 24px;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px;
  text-align: center;
}
.state-icon { color: var(--gray-300); }
.state-icon.error { color: var(--danger-400, var(--danger-500)); }
.state-title { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-top: 6px; }
.state-desc { font-size: 12px; color: var(--gray-500); max-width: 260px; line-height: 1.6; }
.state-actions { display: flex; gap: 6px; margin-top: 8px; }

/* Loading */
.state-loading {
  padding: 24px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 220px;
}
.state-loading.center { align-items: center; text-align: center; justify-content: center; gap: 12px; }
.skeleton-line {
  height: 12px;
  background: linear-gradient(90deg, var(--gray-100) 0%, var(--gray-200) 50%, var(--gray-100) 100%);
  background-size: 200% 100%;
  border-radius: 4px;
  animation: shimmer 1.5s linear infinite;
}
.w-40 { width: 40%; }
.w-50 { width: 50%; }
.w-60 { width: 60%; }
.w-65 { width: 65%; }
.w-70 { width: 70%; }
.w-80 { width: 80%; }
.skeleton-block {
  height: 80px;
  background: linear-gradient(90deg, var(--gray-100) 0%, var(--gray-200) 50%, var(--gray-100) 100%);
  background-size: 200% 100%;
  border-radius: 6px;
  animation: shimmer 1.5s linear infinite;
}
.skeleton-card {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
}
.skeleton-circle {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(90deg, var(--gray-100) 0%, var(--gray-200) 50%, var(--gray-100) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.5s linear infinite;
  flex-shrink: 0;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.state-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--gray-100);
  border-top-color: var(--primary-600);
  border-radius: 50%;
  animation: spin 700ms linear infinite;
}
.state-progress {
  width: 220px;
  height: 6px;
  background: var(--gray-100);
  border-radius: 3px;
  overflow: hidden;
}
.state-progress > div {
  height: 100%;
  background: var(--primary-600);
  border-radius: 3px;
  transition: width 0.5s;
}
.state-progress-label { font-size: 11px; color: var(--gray-500); }

/* Error */
.state-error {
  padding: 36px 24px;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px;
  text-align: center;
}

/* Degraded */
.state-degraded { display: flex; flex-direction: column; }
.state-degraded-banner {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--warning-50);
  border-bottom: 1px solid var(--warning-500);
  color: var(--warning-700);
  font-size: 12px;
}
.state-degraded-banner.danger {
  background: var(--danger-50);
  color: var(--danger-700);
  border-bottom-color: var(--danger-500);
}
.state-degraded-banner > span { flex: 1; }
.state-degraded-body { padding: 16px; }
.state-block-row { display: flex; flex-direction: column; gap: 6px; }
.state-block {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
}
.state-block.ok { background: var(--success-50); color: var(--success-700); }
.state-block.warn { background: var(--warning-50); color: var(--warning-700); }
.state-degraded-detail { font-size: 12px; color: var(--gray-600); line-height: 1.6; }
.state-degraded-detail ul { margin: 6px 0 0; padding-left: 18px; }
.state-degraded-detail li { margin-bottom: 2px; }

/* Success */
.state-toast {
  display: flex; gap: 10px;
  margin: 24px;
  padding: 12px 14px;
  border: 1px solid;
  border-radius: var(--radius-md);
  align-items: flex-start;
}
.state-toast.success { background: var(--success-50); border-color: var(--success-500); color: var(--success-700); }
.state-toast.info { background: var(--info-50); border-color: var(--info-500); color: var(--info-700); }
.state-toast-icon { flex-shrink: 0; padding-top: 2px; }
.state-toast-body { flex: 1; font-size: 13px; }
.state-toast-body strong { display: block; font-weight: 600; }
.state-toast-body > div { font-size: 12px; margin-top: 2px; }
.state-inline-success {
  display: inline-flex; align-items: center; gap: 6px;
  margin: 16px 24px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--success-700);
  background: var(--success-50);
  border-radius: 14px;
  width: max-content;
}

/* =========================================================
   Responsive
   ========================================================= */
@media (max-width: 1240px) {
  .modgrid { grid-template-columns: repeat(3, 1fr); }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .feature-grid { grid-template-columns: repeat(2, 1fr); }
  .zone.two-col { grid-template-columns: 1fr; }
}
@media (max-width: 820px) {
