<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Climate Action Platform — BIG · Indonesia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* =========================================================
   DESIGN TOKENS — §13 Visual Design System
   ========================================================= */
:root {
  /* ===== ARAH 2 — TROPICAL ATMOSPHERE PALETTE =====
     Token names dipertahankan supaya semua komponen otomatis pick up.
     Primary remapped: BIG blue → deep ocean teal-blue (#0E5A78).
     Gray scale dimiringkan ke warm forest-ink.
     Risk colors di-retune supaya harmonis dengan brand.
  */

  /* Brand (replaces "Primary blue (BIG)") — deep ocean teal-blue */
  --primary-50:  #E1ECF1;
  --primary-100: #C5DCE5;
  --primary-200: #9CC1D0;
  --primary-300: #69A4BD;
  --primary-400: #3784A2;
  --primary-500: #1B6E8A;
  --primary-600: #0E5A78;   /* BRAND PRIMARY */
  --primary-700: #074866;
  --primary-800: #063A53;
  --primary-900: #062D40;

  /* New identity accents — Indonesia tropical-archipelago */
  --accent-sea:    #2A9D8F;
  --accent-forest: #5B8C5A;
  --accent-sunset: #E9A352;

  /* Semantic — retuned harmoniously with tropical brand */
  --success-50:  #E5F1EB;
  --success-500: #5B8C5A;
  --success-700: #2F7D5E;
  --warning-50:  #FDF3DC;
  --warning-500: #C18820;
  --warning-700: #8B5F0E;
  --danger-50:   #F7E6E3;
  --danger-500:  #C44E37;
  --danger-600:  #A93E2A;
  --danger-700:  #8B1A1A;
  --info-50:     #E1F0EE;
  --info-500:    #2A9D8F;
  --info-700:    #0E5A78;

  /* Neutrals — warm forest-ink (was cool blue-grey) */
  --gray-50:  #F4F7F5;       /* Atmosphere background */
  --gray-100: #E9EEEA;       /* Surface sunken / table header */
  --gray-200: #DEE5DD;       /* Border subtle */
  --gray-300: #B7C4BD;       /* Border strong */
  --gray-400: #9DACA4;
  --gray-500: #6B7B74;
  --gray-600: #4F5F58;
  --gray-700: #3E4F49;
  --gray-800: #1F2E29;
  --gray-900: #0F1F1A;       /* Deep forest ink */

  /* Risk gradient — retuned, semantic order preserved */
  --risk-1: #1E6CB5;
  --risk-2: #2F7D5E;
  --risk-3: #C18820;
  --risk-4: #C44E37;
  --risk-5: #8B1A1A;

  /* Layout */
  --topbar-h: 56px;
  --contextbar-h: 56px;
  --statusbar-h: 28px;
  --sidebar-w: 240px;
  --sidebar-collapsed-w: 56px;
  --ai-drawer-w: 420px;
  --content-max: 1440px;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.10), 0 10px 10px -5px rgba(0,0,0,0.04);
  --shadow-2xl: 0 25px 50px -12px rgba(0,0,0,0.25);

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-2xl: 16px;

  /* Motion */
  --dur-fast: 150ms;
  --dur-base: 250ms;
  --ease-out: cubic-bezier(0,0,0.2,1);
  --ease-in-out: cubic-bezier(0.4,0,0.2,1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--gray-900);
  background: var(--gray-50);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font: inherit; }
kbd { font-family: "JetBrains Mono", monospace; font-size: 11px; }

/* =========================================================
   APP SHELL
   ========================================================= */
.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.app-body {
  flex: 1;
  display: flex;
  min-height: 0;
}
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--gray-50);
}
.content[data-route="map"] { overflow: hidden; padding: 0; }

/* =========================================================
   TOP BAR — §5.1
   ========================================================= */
.topbar {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 16px;
  background: white;
  border-bottom: 1px solid var(--gray-200);
  position: relative;
  z-index: 30;
}
.topbar-left {
  display: flex; align-items: center; gap: 12px;
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
}
.icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-600);
  transition: background var(--dur-fast);
}
.icon-btn:hover { background: var(--gray-100); color: var(--gray-900); }

.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 8px;
  border-radius: var(--radius-md);
  transition: background var(--dur-fast);
}
.brand:hover { background: var(--gray-50); }
.brand-mark { display: flex; }
.brand-text { text-align: left; line-height: 1.1; }
.brand-name {
  font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
  color: var(--gray-900);
}
.brand-sub {
  font-size: 10px; color: var(--gray-500); font-weight: 500;
  letter-spacing: 0.02em;
}

.search-trigger {
  flex: 1;
  max-width: 640px;
  display: flex; align-items: center; gap: 8px;
  height: 36px; padding: 0 12px;
  background: var(--gray-100);
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  color: var(--gray-500);
  font-size: 13px;
  transition: all var(--dur-fast);
}
.search-trigger:hover {
  background: white;
  border-color: var(--gray-300);
}
.search-trigger span {
  flex: 1; text-align: left;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.kbd-inline {
  background: white;
  border: 1px solid var(--gray-200);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  color: var(--gray-600);
}
kbd {
  display: inline-block;
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 11px;
  color: var(--gray-700);
  margin: 0 2px;
}

.topbar-right {
  display: flex; align-items: center; gap: 4px;
  margin-left: auto;
}
.topbtn {
  height: 36px; padding: 0 12px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500;
  color: var(--gray-700);
  transition: background var(--dur-fast);
  position: relative;
}
.topbtn:hover { background: var(--gray-100); }
.topbtn.icon-only { padding: 0 10px; }
.badge-dot {
  position: absolute;
  top: 4px; right: 4px;
  min-width: 16px; height: 16px;
  padding: 0 4px;
  background: var(--danger-500);
  color: white;
  border-radius: 8px;
  font-size: 10px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid white;
}
.topbtn-wrap { position: relative; }

/* dropdowns */
.dropdown {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-xl);
  min-width: 280px;
  padding: 6px;
  z-index: 50;
  animation: dropFade 150ms var(--ease-out);
}
@keyframes dropFade {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.dropdown-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px 6px;
  font-size: 12px; font-weight: 600;
  color: var(--gray-700);
  border-bottom: 1px solid var(--gray-100);
  margin-bottom: 4px;
}
.link-btn {
  color: var(--primary-600);
  font-size: 12px; font-weight: 500;
  padding: 0;
  background: none;
}
.link-btn:hover { text-decoration: underline; }
.dropdown-item {
  width: 100%;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--gray-800);
  text-align: left;
}
.dropdown-item:hover { background: var(--gray-50); }
.dropdown-item.active { background: var(--primary-50); color: var(--primary-700); }
.dropdown-item.danger { color: var(--danger-600); }
.dropdown-item.danger:hover { background: var(--danger-50); }
.dropdown-item span { flex: 1; }
.dropdown-sep { height: 1px; background: var(--gray-100); margin: 4px 0; }

.notif-dropdown { width: 360px; }
.notif-item {
  display: flex; gap: 10px;
  padding: 10px;
  border-radius: var(--radius-md);
  cursor: pointer;
}
.notif-item:hover { background: var(--gray-50); }
.notif-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.notif-danger { background: var(--danger-50); color: var(--danger-600); }
.notif-info { background: var(--info-50); color: var(--info-700); }
.notif-success { background: var(--success-50); color: var(--success-700); }
.notif-body { flex: 1; min-width: 0; }
.notif-title { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.notif-text {
  font-size: 12px; color: var(--gray-600);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.notif-when { font-size: 11px; color: var(--gray-400); flex-shrink: 0; }
.dropdown-foot {
  padding: 8px 10px;
  border-top: 1px solid var(--gray-100);
  margin-top: 4px;
  text-align: center;
}
.lang-dropdown { min-width: 200px; }
.user-dropdown { min-width: 280px; }
.user-info { display: flex; gap: 12px; padding: 10px; }
.user-name { font-weight: 600; font-size: 13px; color: var(--gray-900); }
.user-meta { font-size: 12px; color: var(--gray-600); }
.user-meta.muted { color: var(--gray-400); }

.user-pill {
  display: flex; align-items: center; gap: 8px;
  height: 36px; padding: 0 8px 0 4px;
  border-radius: var(--radius-md);
  transition: background var(--dur-fast);
}
.user-pill:hover { background: var(--gray-100); }
.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.avatar.lg { width: 40px; height: 40px; font-size: 14px; }
.user-pill-text { line-height: 1.1; text-align: left; }
.user-pill .user-name { font-size: 12px; }
.user-pill .user-role { font-size: 10px; color: var(--gray-500); }

/* =========================================================
   SIDEBAR — §5.2
   ========================================================= */
.sidebar {
  width: var(--sidebar-w);
  background: white;
  border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column;
  transition: width var(--dur-base) var(--ease-in-out);
  overflow: hidden;
  flex-shrink: 0;
}
.sidebar.collapsed { width: var(--sidebar-collapsed-w); }
.sidebar-nav {
  flex: 1;
  padding: 12px 8px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 2px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  width: 100%;
  padding: 8px 12px;
  border-radius: var(--radius-md);
  color: var(--gray-600);
  font-size: 13px; font-weight: 500;
  text-align: left;
  position: relative;
  transition: all var(--dur-fast);
}
.nav-item:hover {
  background: var(--gray-50);
  color: var(--gray-900);
}
.nav-item.active {
  background: var(--primary-50);
  color: var(--primary-700);
  font-weight: 600;
}
.nav-active-bar {
  position: absolute;
  left: -8px; top: 8px; bottom: 8px;
  width: 3px;
  background: var(--primary-600);
  border-radius: 0 2px 2px 0;
}
.nav-label {
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-count {
  font-size: 11px;
  color: var(--gray-400);
  font-weight: 600;
  background: var(--gray-100);
  padding: 1px 6px;
  border-radius: 8px;
}
.nav-item.active .nav-count { background: var(--primary-100); color: var(--primary-700); }
.nav-item.small { padding: 6px 12px; font-size: 12px; color: var(--gray-500); }

.sidebar-foot {
  padding: 12px 8px;
  border-top: 1px solid var(--gray-100);
}
.sidebar-section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--gray-400);
  padding: 4px 12px 6px;
}
.sidebar.collapsed .nav-label,
.sidebar.collapsed .nav-count,
.sidebar.collapsed .sidebar-section-label,
.sidebar.collapsed .sidebar-foot { display: none; }
.sidebar.collapsed .nav-item { justify-content: center; padding: 8px; }

/* =========================================================
   CONTEXT BAR — §5.3
   ========================================================= */
.contextbar {
  background: white;
  border-bottom: 1px solid var(--gray-200);
  position: relative;
  z-index: 20;
}
.crisis-banner {
  background: linear-gradient(90deg, var(--danger-700), #5A1212);
  color: white;
  padding: 8px 16px;
  font-size: 13px;
  display: flex; align-items: center; gap: 10px;
  font-weight: 500;
}
.crisis-banner strong { font-weight: 700; }
.crisis-meta { opacity: 0.85; font-size: 12px; margin-left: 8px; }
.crisis-cta {
  margin-left: auto;
  background: white;
  color: var(--danger-700);
  padding: 4px 12px;
  border-radius: var(--radius-md);
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.crisis-cta:hover { background: var(--gray-100); }

.ctx-row {
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px;
  height: var(--contextbar-h);
  flex-wrap: nowrap;
  overflow-x: auto;
}
.ctx-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-500);
  margin-right: 4px;
}
.ctx-picker { position: relative; }
.ctx-picker-btn {
  display: flex; align-items: center; gap: 8px;
  height: 40px; padding: 4px 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  transition: all var(--dur-fast);
  white-space: nowrap;
}
.ctx-picker-btn:hover { background: white; border-color: var(--gray-300); }
.ctx-picker.open .ctx-picker-btn {
  background: white;
  border-color: var(--primary-400);
  box-shadow: 0 0 0 3px var(--primary-100);
}
.ctx-picker-content { text-align: left; line-height: 1.1; }
.ctx-picker-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.ctx-picker-value { font-size: 13px; font-weight: 600; color: var(--gray-900); margin-top: 2px; }
.ctx-picker-menu {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-xl);
  min-width: 280px;
  padding: 6px;
  z-index: 40;
  max-height: 360px;
  overflow-y: auto;
  animation: dropFade 150ms var(--ease-out);
}
.picker-item {
  width: 100%;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  text-align: left;
  transition: background var(--dur-fast);
}
.picker-item:hover { background: var(--gray-50); }
.picker-item.active { background: var(--primary-50); }
.picker-item-main { font-size: 13px; font-weight: 500; color: var(--gray-900); }
.picker-item-sub { font-size: 11px; color: var(--gray-500); margin-top: 2px; }

.ctx-divider {
  width: 1px;
  height: 24px;
  background: var(--gray-200);
  margin: 0 4px;
}
.ctx-pins {
  display: flex; align-items: center; gap: 6px;
}
.ctx-pins-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.pin-chip {
  display: inline-flex; align-items: center; gap: 4px;
  height: 26px; padding: 0 10px;
  background: var(--primary-50);
  color: var(--primary-700);
  border-radius: 13px;
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--primary-100);
  transition: all var(--dur-fast);
}
.pin-chip:hover { background: var(--primary-100); }
.pin-chip.add {
  background: white;
  color: var(--gray-500);
  border-color: var(--gray-200);
  border-style: dashed;
}
.pin-chip.add:hover { color: var(--primary-700); border-color: var(--primary-400); }

/* =========================================================
   STATUS BAR — §5.8
   ========================================================= */
.statusbar {
  height: var(--statusbar-h);
  background: var(--gray-900);
  color: var(--gray-400);
  display: flex; align-items: center;
  padding: 0 16px;
  gap: 12px;
  font-size: 11px;
  font-family: "JetBrains Mono", monospace;
  flex-shrink: 0;
}
.status-cluster {
  display: flex; align-items: center; gap: 6px;
}
.status-cluster strong {
  color: var(--gray-100);
  font-weight: 500;
}
.status-sep {
  width: 1px; height: 12px;
  background: var(--gray-700);
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  background: var(--gray-500);
}
.status-dot.online {
  background: var(--success-500);
  box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
}
.status-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
}
.spin { animation: spin 1.4s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* =========================================================
   DASHBOARD — §6
   ========================================================= */
.dashboard {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: 24px 32px 48px;
  display: flex; flex-direction: column; gap: 24px;
}
html[data-density="compact"] .dashboard { gap: 16px; padding: 16px 20px 24px; }

.hero-row {
  display: flex; justify-content: space-between; align-items: flex-end; gap: 32px;
}
.hero-greet {
  font-size: 13px;
  color: var(--gray-500);
  font-weight: 500;
  margin-bottom: 4px;
}
.hero-title {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin: 0;
  color: var(--gray-900);
  text-wrap: balance;
}
.hero-emph { color: var(--primary-700); }
.hero-sub {
  font-size: 14px;
  color: var(--gray-600);
  margin-top: 8px;
  max-width: 720px;
}
.hero-aside {
  flex-shrink: 0;
}
.hero-stat {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  min-width: 220px;
  box-shadow: var(--shadow-sm);
}
.hero-stat-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
}
.hero-stat-value {
  display: flex; align-items: baseline; gap: 4px;
  margin-top: 4px;
}
.hero-stat-num {
  font-size: 32px;
  font-weight: 700;
  color: var(--warning-700);
  line-height: 1;
}
.crisis-mode .hero-stat-num { color: var(--danger-600); }
.hero-stat-unit { font-size: 13px; color: var(--gray-500); }
.hero-stat-meta {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px;
  color: var(--gray-600);
  margin-top: 6px;
}

.zone { display: flex; flex-direction: column; gap: 12px; }
.zone.two-col {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 20px;
}

/* Quick actions */
.quick-zone { }
.quick-row {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.quick-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-500);
  margin-right: 4px;
}
.quick-btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 36px; padding: 0 14px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  font-size: 13px; font-weight: 500;
  color: var(--gray-700);
  box-shadow: var(--shadow-sm);
  transition: all var(--dur-fast);
}
.quick-btn:hover {
  border-color: var(--gray-300);
  background: var(--gray-50);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.quick-btn.primary {
  background: var(--primary-600);
  color: white;
  border-color: var(--primary-600);
}
.quick-btn.primary:hover { background: var(--primary-700); border-color: var(--primary-700); }
.quick-btn.ghost { border-color: transparent; box-shadow: none; }
.quick-btn.ghost:hover { border-color: var(--gray-200); }
.quick-spacer { flex: 1; }

/* =========================================================
   KPI Cards — §6.5, §16.1
   ========================================================= */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.kpi-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: all var(--dur-fast);
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.kpi-card:hover {
  border-color: var(--gray-300);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.kpi-card.warning::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--warning-500);
}
.kpi-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.kpi-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.kpi-more {
  color: var(--gray-400);
  width: 20px; height: 20px;
  border-radius: var(--radius-sm);
}
.kpi-more:hover { background: var(--gray-100); color: var(--gray-700); }
.kpi-value { display: flex; align-items: baseline; gap: 4px; }
.kpi-num {
  font-size: 32px;
  font-weight: 700;
  color: var(--gray-900);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
  letter-spacing: -0.02em;
}
.kpi-unit { font-size: 13px; color: var(--gray-500); }
.kpi-meta {
  display: flex; align-items: center; gap: 8px;
  margin-top: 6px;
}
.kpi-trend {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 2px 6px;
  border-radius: 10px;
  font-size: 11px; font-weight: 600;
  background: var(--gray-100);
  color: var(--gray-600);
}
.kpi-trend.up { background: var(--success-50); color: var(--success-700); }
.kpi-trend.down { background: var(--danger-50); color: var(--danger-700); }
.kpi-card.warning .kpi-trend.up { background: var(--warning-50); color: var(--warning-700); }
.kpi-delta { font-size: 11px; color: var(--gray-500); }
.kpi-spark {
  width: 100%; height: 32px;
  margin-top: 8px;
  color: var(--primary-500);
  opacity: 0.7;
}
.kpi-card.warning .kpi-spark { color: var(--warning-500); }
.kpi-link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 500;
  color: var(--primary-600);
  margin-top: 4px;
}
.kpi-link:hover { text-decoration: underline; }

/* =========================================================
   Cards (generic) + Map + Activity
   ========================================================= */
.card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--gray-100);
}
.card-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 600; color: var(--gray-900);
}
.card-actions { display: flex; gap: 6px; }
.ghost-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border-radius: var(--radius-md);
  font-size: 12px; font-weight: 500;
  color: var(--gray-600);
  border: 1px solid var(--gray-200);
  background: white;
  transition: all var(--dur-fast);
}
.ghost-btn:hover { background: var(--gray-50); color: var(--gray-900); border-color: var(--gray-300); }
.ghost-btn.small { padding: 4px 8px; font-size: 11px; }
.primary-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--primary-600);
  color: white;
  border-radius: var(--radius-md);
  font-size: 12px; font-weight: 600;
  transition: background var(--dur-fast);
}
.primary-btn:hover { background: var(--primary-700); }

/* Risk Map Inline */
.risk-map-card { height: 560px; min-height: 0; }
.layer-toggle-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--gray-100);
  flex-wrap: wrap;
}
.layer-toggle-label {
  font-size: 12px; font-weight: 500; color: var(--gray-600);
}
.layer-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border: 1px solid var(--gray-200);
  border-radius: 14px;
  background: white;
  font-size: 12px; font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  transition: all var(--dur-fast);
}
.layer-chip input { display: none; }
.layer-chip.on {
  border-color: currentColor;
}
.layer-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid;
  flex-shrink: 0;
}
.layer-spacer { flex: 1; }

.map-stage {
  position: relative;
  flex: 1;
  min-height: 260px;
  background: linear-gradient(180deg, #F4F7F5 0%, #E0F2FE 100%);
}
.map-svg { width: 100%; height: 100%; display: block; }
.kab-path {
  cursor: pointer;
  transition: opacity var(--dur-fast), stroke-width var(--dur-fast);
}
.kab-path:hover { stroke-width: 2.5; opacity: 1 !important; filter: brightness(1.05); }

.map-overlay-tl { position: absolute; top: 12px; left: 12px; }
.map-overlay-tr {
  position: absolute; top: 12px; right: 12px;
  display: flex; flex-direction: column; gap: 4px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 4px;
  box-shadow: var(--shadow-md);
}
.map-ctrl {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-600);
}
.map-ctrl:hover { background: var(--gray-100); color: var(--gray-900); }
.map-ctrl-sep { height: 1px; background: var(--gray-100); margin: 2px 0; }
.map-coord {
  display: flex; align-items: center; gap: 6px;
  background: white;
  border: 1px solid var(--gray-200);
  padding: 4px 8px;
  border-radius: var(--radius-md);
  font-size: 11px;
  font-family: "JetBrains Mono", monospace;
  color: var(--gray-700);
  box-shadow: var(--shadow-sm);
}
.map-coord .muted { color: var(--gray-400); }
.map-attribution {
  background: rgba(255,255,255,0.85);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
  color: var(--gray-600);
}

.legend {
  position: absolute;
  bottom: 12px; left: 12px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 8px 10px;
  box-shadow: var(--shadow-md);
  font-size: 11px;
}
.legend.wide { min-width: 200px; }
.legend-title {
  font-weight: 600;
  font-size: 11px;
  color: var(--gray-700);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.legend-rows { display: flex; flex-direction: column; gap: 4px; }
.legend-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px;
  color: var(--gray-700);
}
.legend-swatch {
  width: 12px; height: 12px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-meta {
  font-size: 10px; color: var(--gray-500);
  margin-top: 6px;
  max-width: 200px;
}

.map-tooltip {
  position: absolute;
  background: var(--gray-900);
  color: white;
  padding: 8px 10px;
  border-radius: var(--radius-md);
  font-size: 12px;
  box-shadow: var(--shadow-xl);
  pointer-events: none;
  z-index: 5;
  min-width: 160px;
}
.map-tooltip.large { min-width: 200px; }
.map-tooltip-title { font-weight: 600; margin-bottom: 4px; }
.map-tooltip-row {
  display: flex; justify-content: space-between;
  font-size: 11px;
  color: var(--gray-300);
}
.map-tooltip-row strong { color: white; }
.map-tooltip-hint {
  font-size: 10px;
  color: var(--gray-400);
  margin-top: 4px;
  padding-top: 4px;
  border-top: 1px solid var(--gray-700);
}

.map-insight {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--gray-100);
  font-size: 12px;
  color: var(--gray-700);
  background: var(--primary-50);
}
.map-insight strong { color: var(--gray-900); }

/* Activity Feed */
.activity-card { height: 560px; max-height: 560px; }
.activity-tabs {
  display: flex; gap: 2px;
  padding: 8px 16px 0;
  border-bottom: 1px solid var(--gray-100);
}
.activity-tab {
  padding: 6px 10px 8px;
  font-size: 12px; font-weight: 500;
  color: var(--gray-500);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.activity-tab.active { color: var(--primary-700); border-bottom-color: var(--primary-600); }
.activity-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
  min-height: 0;
}
.activity-item {
  display: flex; gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--gray-100);
  cursor: pointer;
  transition: background var(--dur-fast);
}
.activity-item:hover { background: var(--gray-50); }
.activity-item.alert { background: linear-gradient(90deg, rgba(220,38,38,0.04), transparent); }
.activity-icon {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  background: var(--gray-100);
  color: var(--gray-600);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.activity-icon.type-alert { background: var(--danger-50); color: var(--danger-600); }
.activity-icon.type-comment { background: var(--info-50); color: var(--info-700); }
.activity-icon.type-report { background: var(--success-50); color: var(--success-700); }
.activity-icon.type-scenario { background: var(--primary-50); color: var(--primary-700); }
.activity-icon.type-ai { background: #F5F0F7; color: #6A4C93; }
.activity-icon.type-consultation { background: #FDF3DC; color: #8B5F0E; }
.activity-icon.type-data { background: var(--gray-100); color: var(--gray-700); }
.activity-body { flex: 1; min-width: 0; }
.activity-title { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.activity-text {
  font-size: 12px; color: var(--gray-600);
  margin-top: 2px; line-height: 1.4;
}
.activity-meta {
  font-size: 11px; color: var(--gray-400);
  margin-top: 4px;
  display: flex; gap: 4px;
}
.dot-sep { color: var(--gray-300); }
.activity-more {
  padding: 10px;
  border-top: 1px solid var(--gray-100);
  background: var(--gray-50);
  color: var(--primary-600);
  font-size: 12px; font-weight: 500;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.activity-more:hover { background: var(--primary-50); }

/* =========================================================
   Module Grid — §6.9
   ========================================================= */
.modgrid-section { display: flex; flex-direction: column; gap: 12px; }
.modgrid-head {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap;
}
.modgrid-count {
  margin-left: 4px;
  font-size: 11px;
  font-weight: 500;
  color: var(--gray-400);
  text-transform: none;
  letter-spacing: 0;
}
.modgrid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}
.modtile {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 16px;
  text-align: left;
  position: relative;
  transition: all var(--dur-fast);
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
  gap: 6px;
  min-height: 152px;
}
.modtile:hover {
  border-color: var(--gray-300);
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.modtile[data-fav="true"] {
  border-color: var(--primary-200);
  background: linear-gradient(180deg, var(--primary-50) 0%, white 40%);
}
.modtile-head {
  display: flex; justify-content: space-between; align-items: flex-start;
}
.modtile-icon {
  width: 38px; height: 38px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.module-modeling { background: #F7E6E3; color: #8B1A1A; }
.module-vulnerability { background: #FDF3DC; color: #8B5F0E; }
.module-sectoral { background: #E9EEEA; color: #4F5F58; }
.module-sdss { background: #E1ECF1; color: #074866; }
.module-ai { background: #EDE6F0; color: #6A4C93; }
.module-collab { background: #FBE9DA; color: #C44E37; }
.module-reports { background: #C5DCE5; color: #1B6E8A; }
.module-data { background: #DCE9DC; color: #047857; }
.module-map { background: #D7EBE9; color: #0E5A78; }
.module-settings { background: #E9EEEA; color: #4F5F58; }
.module-dashboard { background: var(--primary-100); color: var(--primary-700); }
.modtile-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.modtile-badge.fav { background: var(--primary-100); color: var(--primary-700); }
.modtile-badge.new { background: var(--success-500); color: white; }
.modtile-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-900);
  line-height: 1.2;
}
.modtile-count {
  font-size: 11px;
  color: var(--gray-500);
  font-weight: 500;
}
.modtile-tag {
  font-size: 11px;
  color: var(--gray-500);
  line-height: 1.4;
  flex: 1;
  margin-top: 4px;
}
.modtile-arrow {
  position: absolute;
  bottom: 12px; right: 12px;
  color: var(--gray-300);
  transition: all var(--dur-fast);
}
.modtile:hover .modtile-arrow { color: var(--primary-600); transform: translateX(2px); }

/* =========================================================
   AI Drawer — §5.6, §16.6
   ========================================================= */
.ai-drawer-scrim {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.18);
  z-index: 90;
  animation: fadeIn 200ms var(--ease-out);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.ai-drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: var(--ai-drawer-w);
  background: white;
  border-left: 1px solid var(--gray-200);
  box-shadow: var(--shadow-2xl);
  z-index: 91;
  display: flex; flex-direction: column;
  animation: slideInRight 250ms var(--ease-out);
}
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
.ai-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--gray-200);
}
.ai-head-title { display: flex; align-items: center; gap: 10px; }
.ai-avatar {
  width: 32px; height: 32px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent-sea), var(--primary-700));
  color: white;
  display: flex; align-items: center; justify-content: center;
}
.ai-title { font-size: 14px; font-weight: 600; color: var(--gray-900); }
.ai-sub { font-size: 11px; color: var(--gray-500); }
.ai-actions { display: flex; gap: 2px; }

.ai-context-strip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  background: var(--primary-50);
  color: var(--primary-700);
  font-size: 11px;
  border-bottom: 1px solid var(--primary-100);
}

.ai-list {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
}
.ai-msg {
  display: flex; gap: 8px;
}
.ai-msg.role-user { justify-content: flex-end; }
.ai-msg-avatar {
  width: 28px; height: 28px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent-sea), var(--primary-700));
  color: white;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ai-msg-bubble {
  max-width: 320px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  background: var(--gray-100);
  font-size: 13px;
  line-height: 1.5;
}
.ai-msg.role-user .ai-msg-bubble {
  background: var(--primary-600);
  color: white;
}
.ai-msg.role-user .ai-msg-time { color: rgba(255,255,255,0.7); }
.ai-msg-text p { margin: 0 0 6px; }
.ai-msg-text p:last-child { margin-bottom: 0; }
.ai-msg-text li {
  margin-left: 16px;
  margin-bottom: 4px;
}
.ai-msg-text strong { color: inherit; font-weight: 600; }
.ai-msg.role-assistant .ai-msg-text strong { color: var(--gray-900); }
.ai-msg-time { font-size: 10px; color: var(--gray-400); margin-top: 4px; }
.ai-msg-tools {
  display: flex; gap: 4px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--gray-200);
}
.ai-tool-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 6px;
  font-size: 11px;
  color: var(--gray-500);
  border-radius: var(--radius-sm);
}
.ai-tool-btn:hover { background: white; color: var(--gray-900); }
.ai-cursor {
  display: inline-block;
  width: 7px; height: 14px;
  background: var(--primary-600);
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: cursorBlink 800ms steps(2, end) infinite;
}
@keyframes cursorBlink { 50% { opacity: 0; } }

.ai-suggestions {
  padding: 8px 16px;
  border-top: 1px solid var(--gray-100);
}
.ai-suggestions-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--gray-500);
  margin-bottom: 6px;
}
.ai-suggestions-row {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.ai-suggestion {
  padding: 6px 10px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: 14px;
  font-size: 11px;
  color: var(--gray-700);
  transition: all var(--dur-fast);
}
.ai-suggestion:hover {
  background: var(--primary-50);
  border-color: var(--primary-300);
  color: var(--primary-700);
}
.ai-suggestion:disabled { opacity: 0.5; cursor: not-allowed; }

.ai-form {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 12px;
  border-top: 1px solid var(--gray-200);
}
.icon-btn-soft {
  width: 32px; height: 32px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-500);
}
.icon-btn-soft:hover { background: var(--gray-100); color: var(--gray-900); }
.ai-input {
  flex: 1;
  height: 36px; padding: 0 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--gray-900);
  outline: none;
}
.ai-input:focus { background: white; border-color: var(--primary-400); box-shadow: 0 0 0 3px var(--primary-100); }
.ai-send {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  background: var(--primary-600);
  color: white;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--dur-fast);
}
.ai-send:hover:not(:disabled) { background: var(--primary-700); }
.ai-send:disabled { background: var(--gray-200); cursor: not-allowed; }

.ai-foot {
  padding: 8px 16px;
  background: var(--gray-50);
  border-top: 1px solid var(--gray-100);
  font-size: 10px;
  color: var(--gray-500);
  text-align: center;
}

/* Floating AI button */
.floating-ai {
  position: fixed;
  bottom: 40px; right: 24px;
  display: flex; align-items: center; gap: 8px;
  padding: 12px 18px;
  background: linear-gradient(135deg, var(--accent-sea), var(--primary-700));
  color: white;
  border-radius: 999px;
  font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-xl);
  z-index: 50;
  transition: transform var(--dur-fast);
}
.floating-ai:hover { transform: translateY(-2px); box-shadow: var(--shadow-2xl); }
.floating-ai-pulse {
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: inherit;
  opacity: 0.4;
  animation: pulse 2.2s ease-out infinite;
  pointer-events: none;
}
@keyframes pulse {
  0% { transform: scale(1); opacity: 0.4; }
  100% { transform: scale(1.5); opacity: 0; }
}

/* =========================================================
   Search Modal — §5.5
   ========================================================= */
.search-modal-wrap {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.5);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 120px;
  animation: fadeIn 200ms var(--ease-out);
}
.search-modal {
  width: 600px;
  max-width: 90vw;
  background: white;
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-2xl);
  overflow: hidden;
  display: flex; flex-direction: column;
  max-height: 70vh;
  animation: searchPop 200ms var(--ease-out);
}
@keyframes searchPop {
  from { opacity: 0; transform: translateY(-12px) scale(0.98); }
  to { opacity: 1; transform: none; }
}
.search-input-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--gray-200);
  color: var(--gray-400);
}
.search-input {
  flex: 1;
  font-size: 16px;
  background: none;
  border: none;
  outline: none;
  color: var(--gray-900);
}
.search-input::placeholder { color: var(--gray-400); }

.search-results {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.search-empty {
  padding: 40px 24px;
  text-align: center;
  color: var(--gray-500);
}
.search-empty .muted { color: var(--gray-400); font-size: 12px; margin-top: 8px; }

.search-group { padding: 6px 0; }
.search-group-label {
  padding: 6px 18px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-400);
}
.search-result {
  width: 100%;
  display: flex; align-items: center; gap: 12px;
  padding: 8px 18px;
  border: none;
  background: none;
  text-align: left;
  transition: background var(--dur-fast);
}
.search-result.active { background: var(--primary-50); }
.search-result-icon {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  background: var(--gray-100);
  color: var(--gray-600);
  display: flex; align-items: center; justify-content: center;
}
.search-result.active .search-result-icon { background: var(--primary-100); color: var(--primary-700); }
.search-result-body { flex: 1; min-width: 0; }
.search-result-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-900);
}
.search-result-name mark {
  background: var(--warning-50);
  color: var(--warning-700);
  padding: 0 2px;
  border-radius: 2px;
  font-weight: 600;
}
.search-result-desc { font-size: 12px; color: var(--gray-500); margin-top: 1px; }
.search-result-meta {
  display: flex; align-items: center; gap: 4px;
  color: var(--gray-400);
}
.search-result-type {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--gray-100);
}

.search-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 18px;
  border-top: 1px solid var(--gray-100);
  background: var(--gray-50);
  font-size: 11px;
  color: var(--gray-500);
}
.search-foot-keys { display: flex; gap: 12px; }

/* =========================================================
   Map Explorer — full screen
   ========================================================= */
.map-explorer {
  height: 100%;
  display: flex; flex-direction: column;
}
.map-explorer-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: white;
  border-bottom: 1px solid var(--gray-200);
}
.map-explorer-title {
  display: flex; align-items: center; gap: 8px;
  color: var(--gray-600);
}
.map-explorer-title h2 {
  font-size: 16px; font-weight: 600; margin: 0;
  color: var(--gray-900);
}
.back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--gray-600);
}
.back-btn:hover { background: var(--gray-100); color: var(--gray-900); }
.breadcrumb-sep { color: var(--gray-300); }
.map-explorer-meta {
  margin-left: 8px;
  font-size: 12px;
  color: var(--gray-500);
  font-weight: 500;
}
.map-explorer-actions { display: flex; gap: 8px; }

.map-explorer-body {
  flex: 1;
  display: flex;
  min-height: 0;
  position: relative;
}
.map-drawer {
  width: 300px;
  background: white;
  border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column;
  flex-shrink: 0;
  transition: margin-left var(--dur-base) var(--ease-in-out);
}
.map-drawer.hidden { margin-left: -300px; }
.map-drawer-tabs {
  display: flex;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 12px;
}
.map-drawer-tab {
  padding: 10px 12px;
  font-size: 12px; font-weight: 500;
  color: var(--gray-500);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.map-drawer-tab.active { color: var(--primary-700); border-bottom-color: var(--primary-600); }
.map-drawer-search {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  margin: 8px 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  color: var(--gray-400);
}
.map-drawer-search input {
  flex: 1; border: none; background: none; outline: none;
  font-size: 12px;
  color: var(--gray-900);
}
.map-drawer-list { flex: 1; overflow-y: auto; padding: 4px 12px; }
.map-layer-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 8px;
  border-radius: var(--radius-md);
  transition: background var(--dur-fast);
  border: 1px solid transparent;
}
.map-layer-row:hover { background: var(--gray-50); }
.map-layer-row.on { background: var(--primary-50); border-color: var(--primary-100); }
.map-layer-check {
  display: flex; align-items: center;
  cursor: pointer;
}
.map-layer-check input { display: none; }
.checkmark {
  width: 16px; height: 16px;
  border: 1.5px solid var(--gray-300);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  background: white;
  position: relative;
  transition: all var(--dur-fast);
}
.map-layer-check input:checked + .checkmark {
  background: var(--primary-600);
  border-color: var(--primary-600);
}
.map-layer-check input:checked + .checkmark::after {
  content: "";
  width: 4px; height: 8px;
  border-right: 2px solid white;
  border-bottom: 2px solid white;
  transform: rotate(45deg) translate(-1px,-1px);
}
.map-layer-body { flex: 1; min-width: 0; }
.map-layer-name { font-size: 12px; font-weight: 500; color: var(--gray-900); }
.map-layer-source { font-size: 10px; color: var(--gray-500); margin-top: 2px; }
.map-layer-info {
  color: var(--gray-400);
  width: 24px; height: 24px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
}
.map-layer-info:hover { background: white; color: var(--gray-700); }
.map-drawer-section {
  padding: 12px;
  border-top: 1px solid var(--gray-100);
}
.map-drawer-section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-500);
  margin-bottom: 6px;
}
.saved-loc {
  width: 100%;
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--gray-700);
  text-align: left;
}
.saved-loc:hover { background: var(--gray-50); color: var(--primary-700); }
.saved-loc.add { color: var(--gray-500); }
.saved-loc.add:hover { color: var(--primary-700); }

.map-canvas {
  flex: 1;
  position: relative;
  background: linear-gradient(180deg, #F4F7F5 0%, #E0F2FE 100%);
  overflow: hidden;
}
.map-drawer-toggle {
  position: absolute;
  top: 12px;
  width: 28px; height: 36px;
  background: white;
  border: 1px solid var(--gray-200);
  border-left: none;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-600);
  z-index: 5;
  transition: left var(--dur-base) var(--ease-in-out);
  box-shadow: var(--shadow-md);
}
.map-drawer-toggle:hover { background: var(--gray-50); }

/* Time slider */
.time-slider {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  max-width: 800px;
  display: flex; align-items: center; gap: 12px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  box-shadow: var(--shadow-lg);
}
.time-play {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--primary-600);
  color: white;
  display: flex; align-items: center; justify-content: center;
}
.time-play:hover { background: var(--primary-700); }
.time-track {
  flex: 1;
  position: relative;
  height: 32px;
}
.time-range {
  position: absolute;
  inset: 14px 0 0 0;
  width: 100%;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--gray-200);
  border-radius: 2px;
  outline: none;
}
.time-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--primary-600);
  cursor: pointer;
  border: 3px solid white;
  box-shadow: var(--shadow-md);
}
.time-range::-moz-range-thumb {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--primary-600);
  cursor: pointer;
  border: 3px solid white;
}
.time-track-fill {
  position: absolute;
  top: 14px; left: 0;
  height: 4px;
  background: var(--primary-600);
  border-radius: 2px;
  pointer-events: none;
}
.time-ticks {
  position: absolute;
  top: 0; left: 0; right: 0; height: 14px;
  pointer-events: none;
}
.time-tick {
  position: absolute;
  transform: translateX(-50%);
}
.time-tick-mark {
  width: 1px; height: 6px;
  background: var(--gray-300);
  margin: 0 auto;
}
.time-tick-label {
  font-size: 9px;
  color: var(--gray-500);
  margin-top: -2px;
  font-family: "JetBrains Mono", monospace;
}
.time-value {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-900);
  font-variant-numeric: tabular-nums;
  min-width: 40px;
  text-align: right;
}

/* =========================================================
   Module Landing — §7
   ========================================================= */
.module-landing {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: 24px 32px 48px;
  display: flex; flex-direction: column; gap: 24px;
}
.module-head { display: flex; flex-direction: column; gap: 16px; }
.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px;
  color: var(--gray-500);
}
.breadcrumb span { color: var(--gray-700); font-weight: 500; }

.module-hero {
  display: flex; gap: 20px; align-items: flex-start;
}
.module-hero-icon {
  width: 64px; height: 64px;
  border-radius: var(--radius-xl);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.module-hero-text { flex: 1; }
.module-hero-text h1 {
  margin: 0;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--gray-900);
}
.module-hero-desc {
  font-size: 14px;
  color: var(--gray-600);
  margin-top: 6px;
  max-width: 720px;
  line-height: 1.5;
}
.module-hero-actions { display: flex; gap: 6px; }

.module-stats {
  display: flex; gap: 8px;
}
.module-stat {
  padding: 10px 16px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  flex: 1;
  max-width: 200px;
}
.module-stat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
  font-weight: 500;
}
.module-stat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--gray-900);
  margin-top: 2px;
}

.module-section { display: flex; flex-direction: column; gap: 12px; }
.module-section h3 {
  font-size: 16px;
  font-weight: 600;
  margin: 0;
  color: var(--gray-900);
}
.module-section-head {
  display: flex; justify-content: space-between; align-items: center;
}
.filter-pills { display: flex; gap: 4px; }
.filter-pill {
  padding: 4px 10px;
  font-size: 12px;
  border: 1px solid var(--gray-200);
  border-radius: 14px;
  color: var(--gray-600);
  background: white;
  transition: all var(--dur-fast);
}
.filter-pill:hover { background: var(--gray-50); color: var(--gray-900); }
.filter-pill.active {
  background: var(--gray-900);
  border-color: var(--gray-900);
  color: white;
}

.feature-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.feature-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex; flex-direction: column; gap: 6px;
  transition: all var(--dur-fast);
  box-shadow: var(--shadow-sm);
}
.feature-card:hover {
  border-color: var(--gray-300);
  box-shadow: var(--shadow-md);
}
.feature-card-head {
  display: flex; justify-content: space-between; align-items: center;
}
.feature-card-id {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-400);
}
.feature-status {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 2px 6px;
  border-radius: 4px;
}
.status-ready { background: var(--success-50); color: var(--success-700); }
.status-beta { background: var(--warning-50); color: var(--warning-700); }
.feature-card-name {
  font-size: 14px; font-weight: 600;
  color: var(--gray-900);
  margin-top: 2px;
}
.feature-card-desc {
  font-size: 12px;
  color: var(--gray-600);
  flex: 1;
  line-height: 1.5;
}
.feature-card-actions {
  display: flex; gap: 6px;
  margin-top: 8px;
}
.feature-action {
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  background: var(--gray-100);
  color: var(--gray-700);
  transition: all var(--dur-fast);
}
.feature-action:hover { background: var(--gray-200); }
.feature-action.primary {
  background: var(--primary-600);
  color: white;
}
.feature-action.primary:hover { background: var(--primary-700); }

.related-row { display: flex; gap: 10px; flex-wrap: wrap; }
.related-card {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  text-align: left;
  transition: all var(--dur-fast);
  color: var(--gray-700);
}
.related-card:hover {
  border-color: var(--primary-400);
  background: var(--primary-50);
  color: var(--primary-700);
}
.related-name { font-size: 13px; font-weight: 500; color: var(--gray-900); }
.related-mod { font-size: 11px; color: var(--gray-500); }

.placeholder-card {
  background: white;
  border: 1px dashed var(--gray-300);
  border-radius: var(--radius-xl);
  padding: 40px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.placeholder-icon { color: var(--gray-300); }
.placeholder-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--gray-900);
}
.placeholder-desc {
  font-size: 13px;
  color: var(--gray-600);
  max-width: 480px;
}
.placeholder-features {
  text-align: left;
  background: var(--gray-50);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  margin: 8px 0;
}
.placeholder-features-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: 4px;
}
.placeholder-features ul {
  margin: 0; padding-left: 18px;
  font-size: 12px;
  color: var(--gray-600);
}
.placeholder-features li { margin: 2px 0; }

/* =========================================================
   Crisis mode global tints
   ========================================================= */
.app.crisis-mode .topbar {
  background: linear-gradient(180deg, #F7E6E3 0%, white 100%);
  border-bottom-color: var(--danger-200, #F3D4CD);
}

/* =========================================================
   Tweaks panel (override starter defaults if needed)
   ========================================================= */
[data-tweaks-panel] { z-index: 95; }

/* =========================================================
   PART 2 — Tabs, tables, sessions, settings (Sesi 2)
   ========================================================= */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--gray-200);
  margin-bottom: -8px;
}
.tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-500);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: flex; align-items: center; gap: 6px;
  transition: color var(--dur-fast);
}
.tab:hover { color: var(--gray-900); }
.tab.active { color: var(--primary-700); border-bottom-color: var(--primary-600); font-weight: 600; }
.tab-count {
  font-size: 11px;
  background: var(--gray-100);
  color: var(--gray-600);
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 600;
}
.tab.active .tab-count { background: var(--primary-100); color: var(--primary-700); }

.section-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px;
}
.section-head h3 { margin: 0; font-size: 16px; font-weight: 600; color: var(--gray-900); }

/* Pipeline row */
.pipeline-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.pipeline-stage {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  position: relative;
  overflow: hidden;
}
.pipeline-stage::before {
  content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--gray-300);
}
.pipeline-stage.stage-draft::before { background: var(--gray-400); }
.pipeline-stage.stage-konsultasi::before { background: var(--warning-500); }
.pipeline-stage.stage-running::before { background: var(--info-500); }
.pipeline-stage.stage-approved::before { background: var(--success-500); }
.pipeline-stage-label {
  font-size: 11px;
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--gray-500);
}
.pipeline-stage-count {
  font-size: 24px;
  font-weight: 700;
  color: var(--gray-900);
  margin: 2px 0 6px;
}
.pipeline-stage-bar { height: 4px; background: var(--gray-100); border-radius: 2px; overflow: hidden; }
.pipeline-stage-bar > div { height: 100%; background: var(--gray-400); }
.pipeline-stage.stage-konsultasi .pipeline-stage-bar > div { background: var(--warning-500); }
.pipeline-stage.stage-running .pipeline-stage-bar > div { background: var(--info-500); }
.pipeline-stage.stage-approved .pipeline-stage-bar > div { background: var(--success-500); }

/* Data tables */
.table-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.table-head-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
}
.table-search {
  display: flex; align-items: center; gap: 8px;
  height: 32px; padding: 0 12px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  color: var(--gray-400);
  min-width: 240px;
}
.table-search input { flex: 1; border: none; background: none; outline: none; font-size: 12px; color: var(--gray-900); }
.table-actions { display: flex; gap: 6px; align-items: center; }

.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--gray-500);
  padding: 10px 16px;
  background: var(--gray-50);
  border-bottom: 1px solid var(--gray-200);
  white-space: nowrap;
}
.data-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
  vertical-align: middle;
  color: var(--gray-700);
}
.data-table tr:hover td { background: var(--gray-50); }
.data-table tr:last-child td { border-bottom: none; }
.cell-strong { font-weight: 500; color: var(--gray-900); }
.cell-meta { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
.muted { color: var(--gray-400); }
.cell-actions { display: flex; gap: 2px; }
.icon-btn.small { width: 28px; height: 28px; }
.table-foot { padding: 10px 16px; font-size: 12px; color: var(--gray-500); border-top: 1px solid var(--gray-100); }

/* Status pills */
.status-pill { display: inline-block; padding: 2px 8px; font-size: 11px; font-weight: 600; border-radius: 10px; }
.status-pill.status-draft { background: var(--gray-100); color: var(--gray-700); }
.status-pill.status-konsultasi { background: var(--warning-50); color: var(--warning-700); }
.status-pill.status-running { background: var(--info-50); color: var(--info-700); }
.status-pill.status-approved { background: var(--success-50); color: var(--success-700); }

.mcda-score { display: flex; align-items: center; gap: 8px; }
.mcda-num { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 24px; }
.mcda-bar { width: 60px; height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
.mcda-bar > div { height: 100%; }
.comment-cell { display: inline-flex; align-items: center; gap: 4px; color: var(--gray-500); }
.badge-mono {
  display: inline-block;
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 6px;
  background: var(--gray-100);
  color: var(--gray-700);
  border-radius: 3px;
}
.access-pill { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: capitalize; }
.access-public { background: var(--success-50); color: var(--success-700); }
.access-internal { background: var(--info-50); color: var(--info-700); }
.access-restricted { background: var(--danger-50); color: var(--danger-700); }

/* Segmented control */
.seg-control { display: inline-flex; background: var(--gray-100); border-radius: var(--radius-md); padding: 2px; }
.seg-btn { padding: 4px 10px; font-size: 12px; font-weight: 500; color: var(--gray-600); border-radius: var(--radius-sm); }
.seg-btn:hover { color: var(--gray-900); }
.seg-btn.active { background: white; color: var(--gray-900); box-shadow: var(--shadow-sm); }

/* External integrations */
.ext-integrations {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
}
.ext-row-label { font-size: 12px; font-weight: 600; color: var(--gray-600); margin-right: 4px; }
.ext-card {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  flex: 1;
  min-width: 180px;
}
.ext-status-dot { width: 8px; height: 8px; border-radius: 50%; }
.ext-card.status-ok .ext-status-dot { background: var(--success-500); box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
.ext-card.status-degraded .ext-status-dot { background: var(--warning-500); box-shadow: 0 0 0 3px rgba(234,179,8,0.15); }
.ext-card.status-down .ext-status-dot { background: var(--danger-500); }
.ext-name { font-size: 12px; font-weight: 600; color: var(--gray-900); }
.ext-meta { font-size: 10px; color: var(--gray-500); font-family: "JetBrains Mono", monospace; }

/* Reports gallery */
.reports-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.report-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--dur-fast);
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-sm);
}
.report-card:hover {
  border-color: var(--gray-300);
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.report-thumb { height: 140px; position: relative; overflow: hidden; }
.thumb-svg { width: 100%; height: 100%; display: block; }
.report-pages {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
}
.report-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
.report-type {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-500);
}
.report-title { font-size: 13px; font-weight: 600; color: var(--gray-900); line-height: 1.3; margin-top: 2px; }
.report-meta { font-size: 11px; color: var(--gray-500); }
.report-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.report-tag { font-size: 10px; background: var(--gray-100); color: var(--gray-600); padding: 2px 6px; border-radius: 3px; }
.report-actions { display: flex; gap: 4px; margin-top: 8px; }

/* Sessions list (Collab) */
.sessions-list { display: flex; flex-direction: column; gap: 10px; }
.session-card {
  display: flex; gap: 16px; align-items: center;
  padding: 16px 20px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
}
.session-status-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.session-card.status-live .session-status-stripe { background: var(--danger-500); }
.session-card.status-scheduled .session-status-stripe { background: var(--info-500); }
.session-card.status-comments .session-status-stripe { background: var(--warning-500); }
.session-card.status-approved .session-status-stripe { background: var(--success-500); }
.session-main { flex: 1; min-width: 0; padding-left: 8px; }
.session-head { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--gray-500); }
.session-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.session-pill.status-live { background: var(--danger-500); color: white; }
.session-pill.status-scheduled { background: var(--info-50); color: var(--info-700); }
.session-pill.status-comments { background: var(--warning-50); color: var(--warning-700); }
.session-pill.status-approved { background: var(--success-50); color: var(--success-700); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: white; animation: pulseDot 1.4s infinite; }
@keyframes pulseDot { 50% { opacity: 0.4; } }
.session-id { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--gray-400); }
.session-mode { padding: 1px 6px; background: var(--gray-100); color: var(--gray-600); border-radius: 4px; font-size: 10px; font-weight: 500; }
.session-title { font-size: 15px; font-weight: 600; color: var(--gray-900); margin-top: 4px; }
.session-meta { display: flex; gap: 12px; margin-top: 4px; font-size: 12px; color: var(--gray-500); flex-wrap: wrap; }
.session-meta span { display: inline-flex; align-items: center; gap: 4px; }
.session-meta .pending { color: var(--warning-700); }
.session-meta .live-count { color: var(--danger-700); font-weight: 500; }
.session-participants { display: flex; }
.session-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: white;
  border: 2px solid white;
  margin-left: -8px;
}
.session-avatar:first-child { margin-left: 0; }
.session-actions { display: flex; gap: 6px; align-items: center; }

/* Settings layout */
.settings-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 24px;
}
.settings-nav {
  display: flex; flex-direction: column; gap: 2px;
  position: sticky;
  top: 16px;
  align-self: start;
}
.settings-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  text-align: left;
  color: var(--gray-600);
  font-size: 13px;
  font-weight: 500;
  transition: all var(--dur-fast);
}
.settings-nav-item:hover { background: white; color: var(--gray-900); }
.settings-nav-item.active { background: var(--primary-50); color: var(--primary-700); font-weight: 600; }

.settings-pane {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 24px 28px;
}
.settings-pane-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--gray-100);
}
.settings-pane-head h2 { margin: 0; font-size: 18px; font-weight: 600; color: var(--gray-900); }

.form-card { display: flex; flex-direction: column; gap: 18px; }
.form-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 20px;
  align-items: start;
}
.form-label-main { font-size: 13px; font-weight: 500; color: var(--gray-800); }
.form-hint { font-size: 11px; color: var(--gray-500); margin-top: 2px; max-width: 180px; }
.form-control { display: flex; flex-direction: column; gap: 4px; }
.text-input {
  height: 36px;
  padding: 0 12px;
  background: white;
  border: 1px solid var(--gray-300);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--gray-900);
  outline: none;
  width: 100%;
  max-width: 360px;
}
.text-input:focus { border-color: var(--primary-400); box-shadow: 0 0 0 3px var(--primary-100); }
.text-input.small { height: 32px; max-width: 240px; }
.profile-avatar-row { display: flex; align-items: center; gap: 12px; }

/* Toggle */
.toggle {
  width: 36px; height: 20px;
  border-radius: 10px;
  background: var(--gray-300);
  position: relative;
  transition: background var(--dur-fast);
  flex-shrink: 0;
  display: inline-block;
}
.toggle.on { background: var(--success-500); }
.toggle-knob {
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: white;
  border-radius: 50%;
  transition: transform var(--dur-fast);
  box-shadow: var(--shadow-sm);
}
.toggle.on .toggle-knob { transform: translateX(16px); }

/* Notif prefs */
.notif-prefs-table { width: 100%; border-collapse: collapse; }
.notif-prefs-table th { padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-500); border-bottom: 1px solid var(--gray-200); text-align: center; }
.notif-prefs-table th:first-child { text-align: left; }
.notif-prefs-table td { padding: 14px 12px; border-bottom: 1px solid var(--gray-100); text-align: center; }
.notif-prefs-table td:first-child { text-align: left; }
.settings-note {
  display: flex; align-items: center; gap: 8px;
  margin-top: 16px;
  padding: 10px 14px;
  background: var(--info-50);
  border-radius: var(--radius-md);
  font-size: 12px;
  color: var(--info-700);
}

/* Auth */
.auth-method {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--gray-700);
  max-width: 480px;
}
.auth-method > span:nth-child(2) { flex: 1; }
.badge-info { display: inline-block; background: var(--info-50); color: var(--info-700); padding: 4px 10px; border-radius: 6px; font-weight: 600; font-size: 12px; }
.badge-success { display: inline-block; background: var(--success-50); color: var(--success-700); padding: 2px 8px; border-radius: 6px; font-weight: 600; font-size: 11px; }
.sessions-active { display: flex; flex-direction: column; gap: 6px; max-width: 480px; }
.active-session {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--gray-700);
}
.active-session > span { flex: 1; }

/* Audit */
.audit-filters { display: flex; gap: 8px; align-items: center; }
.audit-table { width: 100%; font-size: 12px; border-collapse: collapse; }
.audit-table th { padding: 8px 12px; background: var(--gray-50); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-500); border-bottom: 1px solid var(--gray-200); text-align: left; }
.audit-table td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); }
.audit-table tr:hover td { background: var(--gray-50); }
.mono { font-family: "JetBrains Mono", monospace; font-size: 11px; }
.audit-action {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  background: var(--gray-100);
  color: var(--gray-700);
  padding: 2px 6px;
  border-radius: 3px;
}

/* I18n */
.lang-options { display: flex; gap: 8px; flex-wrap: wrap; }
.lang-radio {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  cursor: pointer;
  min-width: 220px;
  transition: all var(--dur-fast);
}
.lang-radio:hover { border-color: var(--gray-300); }
.lang-radio.active { background: var(--primary-50); border-color: var(--primary-400); }
.lang-radio input { accent-color: var(--primary-600); }
.lang-name { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.lang-meta { font-size: 11px; color: var(--gray-500); }

/* Onboarding */
.onboarding-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.onboard-card {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
}
.onboard-card.done { background: var(--success-50); border-color: var(--success-500); }
.onboard-card.done .onboard-icon { color: var(--success-700); }
.onboard-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  background: var(--gray-100);
  color: var(--gray-500);
  display: flex; align-items: center; justify-content: center;
}
.onboard-body { flex: 1; }
.onboard-name { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.onboard-desc { font-size: 11px; color: var(--gray-500); }

/* API */
.api-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.api-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  flex-wrap: wrap;
}
.api-card-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--gray-500);
  letter-spacing: 0.04em;
  width: 100%;
}
.api-code {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  background: white;
  border: 1px solid var(--gray-200);
  padding: 4px 8px;
  border-radius: 3px;
  color: var(--gray-900);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.api-meta { font-size: 11px; color: var(--gray-500); }
.api-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--gray-500);
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}
.code-block {
  background: var(--gray-900);
  color: #DEE5DD;
  padding: 16px 18px;
  border-radius: var(--radius-md);
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  line-height: 1.6;
  overflow-x: auto;
  margin: 0;
}

/* Integrations */
.integrations-list { display: flex; flex-direction: column; gap: 10px; }
.integration-card {
  display: flex; gap: 16px; align-items: center;
  padding: 16px 20px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
}
.integration-status { flex-shrink: 0; }
.integration-dot { width: 10px; height: 10px; border-radius: 50%; }
.integration-card.status-ok .integration-dot { background: var(--success-500); box-shadow: 0 0 0 4px rgba(34,197,94,0.15); }
.integration-card.status-degraded .integration-dot { background: var(--warning-500); box-shadow: 0 0 0 4px rgba(234,179,8,0.15); }
.integration-card.status-down .integration-dot { background: var(--danger-500); }
.integration-body { flex: 1; }
.integration-name { font-size: 14px; font-weight: 600; color: var(--gray-900); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.integration-desc { font-size: 12px; color: var(--gray-600); margin-top: 2px; }
.integration-note {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px;
  color: var(--warning-700);
  margin-top: 6px;
}
.integration-meta { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.integration-actions { display: flex; gap: 6px; }

/* About & Help (Settings) */
.about-hero { display: flex; align-items: center; gap: 18px; padding: 20px 22px; background: var(--primary-50); border: 1px solid var(--primary-100, var(--gray-200)); border-radius: var(--radius-lg); margin-bottom: 16px; }
.about-logo { width: 56px; height: 56px; border-radius: 14px; background: var(--primary-600); color: #fff; display: grid; place-items: center; flex-shrink: 0; }
.about-app { font-size: 18px; font-weight: 700; color: var(--gray-900); }
.about-sub { font-size: 13px; color: var(--gray-600); margin-top: 2px; }
.about-meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.about-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.about-credit { display: flex; justify-content: space-between; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
.about-credit:last-child { border-bottom: none; }
.about-credit-role { color: var(--gray-500); flex-shrink: 0; }
.about-credit-name { color: var(--gray-900); font-weight: 600; text-align: right; }
.about-links { display: flex; flex-direction: column; gap: 8px; }
.about-link-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface, #fff); border: 1px solid var(--gray-200); border-radius: var(--radius-md); text-align: left; cursor: pointer; transition: all var(--dur-fast); }
.about-link-row:hover { border-color: var(--primary-400); background: var(--primary-50); }
.about-link-row > :first-child { color: var(--primary-600); flex-shrink: 0; }
.about-link-row > :last-child { color: var(--gray-400); margin-left: auto; flex-shrink: 0; }
.about-link-body { flex: 1; min-width: 0; }
.about-link-label { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.about-link-hint { font-size: 11px; color: var(--gray-500); margin-top: 1px; }
@media (max-width: 960px) { .about-cols { grid-template-columns: 1fr; } }

/* Templates */
.template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.template-card {
  display: flex; flex-direction: column; gap: 6px;
  padding: 20px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  text-align: left;
  transition: all var(--dur-fast);
}
.template-card:hover {
  border-color: var(--primary-400);
  background: var(--primary-50);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.template-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-md);
  background: var(--primary-100);
  color: var(--primary-700);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
}
.template-name { font-size: 14px; font-weight: 600; color: var(--gray-900); }
.template-desc { font-size: 12px; color: var(--gray-600); line-height: 1.4; }
.template-uses { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

@media (max-width: 1240px) {
  .reports-grid { grid-template-columns: repeat(2, 1fr); }
  .template-grid { grid-template-columns: repeat(2, 1fr); }
  .pipeline-row { grid-template-columns: repeat(2, 1fr); }
  .settings-layout { grid-template-columns: 1fr; }
  .settings-nav { flex-direction: row; flex-wrap: wrap; position: static; }
  .api-grid { grid-template-columns: 1fr; }
  .onboarding-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
@media (max-width: 820px) {
  .reports-grid { grid-template-columns: 1fr; }
  .template-grid { grid-template-columns: 1fr; }
  .pipeline-row { grid-template-columns: 1fr; }
}

/* =========================================================
   SESI 3 — Flows: Onboarding, Wizard, Group Room, Report Builder, Crisis
   ========================================================= */

/* Onboarding overlay */
.onb-scrim {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 32px;
  animation: fadeIn 200ms var(--ease-out);
}
.onb-modal {
  width: 760px; max-width: 100%;
  background: white;
  border-radius: var(--radius-2xl);
  box-shadow: var(--shadow-2xl);
  display: flex; flex-direction: column;
  max-height: 90vh;
  overflow: hidden;
  animation: searchPop 250ms var(--ease-out);
  position: relative;
}
.onb-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  color: var(--gray-500);
  z-index: 5;
}
.onb-close:hover { background: var(--gray-100); color: var(--gray-900); }
.onb-progress {
